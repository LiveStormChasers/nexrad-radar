<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXRAD Live Radar</title>

<!-- Leaflet — only remaining CDN dep (no binary parsing, just tiles) -->
<link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- bzip2.js MUST be hosted at the same origin as this file.
     GitHub Pages / Cloudflare Pages: drop both files in the repo root. -->
<script src="bzip2.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Barlow+Condensed:wght@400;600;700&display=swap');
:root{--bg:#0a0c0f;--panel:#111418;--border:#1e2329;--bb:#2d3540;--text:#c8d4e0;--dim:#5a6a7a;--accent:#00d4ff;--green:#39ff14;--warn:#ffcc00;--danger:#ff2d2d;--mono:'JetBrains Mono',monospace;--sans:'Barlow Condensed',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{display:flex;align-items:center;gap:12px;padding:6px 14px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.logo{font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.1em;color:var(--accent);text-transform:uppercase;white-space:nowrap}
.cg{display:flex;align-items:center;gap:6px}
.cl{color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
select{background:var(--bg);border:1px solid var(--bb);color:var(--text);font-family:var(--mono);font-size:11px;padding:3px 6px;border-radius:3px;cursor:pointer;outline:none;appearance:none}
select:hover{border-color:var(--accent)}
input[type=range]{width:80px;accent-color:var(--accent);background:none;border:none}
.btn{background:var(--bb);border:1px solid var(--bb);color:var(--text);font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:3px;cursor:pointer}
.btn:hover{background:var(--accent);color:#000}
#sb{display:flex;align-items:center;gap:16px;padding:4px 14px;background:#0d1015;border-bottom:1px solid var(--border);flex-shrink:0;font-size:11px;flex-wrap:wrap}
.si{display:flex;align-items:center;gap:5px;white-space:nowrap}
.sl{color:var(--dim);text-transform:uppercase;font-size:10px;letter-spacing:.06em}
.sv{color:var(--accent);font-weight:500}.sv.ok{color:var(--green)}.sv.warn{color:var(--warn)}.sv.err{color:var(--danger)}
#cdb{margin-left:auto;display:flex;align-items:center;gap:6px}
#cdt{width:80px;height:3px;background:var(--bb);border-radius:2px;overflow:hidden}
#cdf{height:100%;background:var(--accent);transition:width 1s linear}
#mw{position:relative;flex:1;overflow:hidden}
#map{width:100%;height:100%;background:#0d1015}
.leaflet-container{background:#0d1015!important}
.leaflet-control-attribution{background:rgba(10,12,15,.7)!important;color:var(--dim)!important;font-size:9px!important}
.leaflet-control-attribution a{color:var(--accent)!important}
.leaflet-bar a{background:var(--panel)!important;color:var(--text)!important;border-color:var(--bb)!important}
#loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,12,15,.8);z-index:1000;gap:14px;pointer-events:none}
#loading.hidden{display:none}
.spin{width:36px;height:36px;border:3px solid var(--bb);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#lmsg{font-family:var(--sans);font-size:14px;font-weight:600;color:var(--accent);letter-spacing:.08em;text-transform:uppercase}
#lsub{font-size:10px;color:var(--dim)}
#err{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(255,45,45,.12);border:1px solid var(--danger);color:var(--danger);padding:8px 16px;border-radius:4px;font-size:11px;z-index:2000;display:none;max-width:88vw;text-align:center;white-space:pre-wrap;line-height:1.6}
#err.v{display:block}
#leg{position:absolute;bottom:36px;right:14px;background:rgba(10,12,15,.9);border:1px solid var(--bb);border-radius:4px;padding:10px 12px;font-size:10px;min-width:110px;backdrop-filter:blur(6px);pointer-events:none;z-index:500}
#lt{font-family:var(--sans);font-size:12px;font-weight:600;color:var(--accent);margin-bottom:7px;text-transform:uppercase;letter-spacing:.06em}
.lr{display:flex;align-items:center;gap:7px;margin:2px 0}
.ls{width:20px;height:10px;border-radius:1px;flex-shrink:0}
.ll{color:var(--dim)}
</style>
</head>
<body>

  <span class="logo">&#x2B21; NEXRAD L2</span>
  <div class="cg"><span class="cl">Station</span>
    <select id="ss">

<div id="sb">

    <span class="sl">Refresh in</span>

</div>

  <div id="map"></div>
  <div id="loading"><div class="spin"></div><div id="lmsg">Loading&hellip;</div><div id="lsub"></div></div>
  <div id="err"></div>
  <div id="leg"><div id="lt">REF (dBZ)</div><div id="lb"></div></div>
</div>

<script>
/* ================================================================
   NEXRAD Level-2 Live Radar  —  v5 (GitHub Pages / CF Pages)
   
   Key architecture decisions:
   • bzip2.js loaded same-origin → no CDN blocking in Edge
   • WORKER_URL: set to your Cloudflare Worker for proxied S3 access
     Leave empty to fetch unidata S3 directly (works in most browsers)
   • Pure manual AR2V0006 parser — no external library needed
   ================================================================ */

// ── Config ───────────────────────────────────────────────────────
// Set this to your deployed Cloudflare Worker URL, e.g.:
//   const WORKER = 'https://nexrad-proxy.YOUR-SUBDOMAIN.workers.dev';
// Leave empty string to hit S3 directly (works from http:// or https://)
const WORKER   = '';
const S3_DIRECT = 'https://unidata-nexrad-level2-chunks.s3.amazonaws.com';
const REFRESH_MS = 120000;

// ── Station table ────────────────────────────────────────────────
const STA = {
  KTLX:{lat:35.3331,lon:-97.2775}, KFWS:{lat:32.5728,lon:-97.3028},
  KICT:{lat:37.6544,lon:-97.4428}, KINX:{lat:36.1750,lon:-95.5647},
  KSRX:{lat:35.2904,lon:-94.3619}, KSHV:{lat:32.4508,lon:-93.8411},
  KLZK:{lat:34.8364,lon:-92.2619}, KNQA:{lat:35.3447,lon:-89.8733},
  KGWX:{lat:33.8967,lon:-88.3289}, KBMX:{lat:33.1722,lon:-86.7697},
  KOHX:{lat:36.2472,lon:-86.5625}, KHTX:{lat:34.9306,lon:-86.0836},
};
const PRD = {
  REF:{range:460000}, VEL:{range:230000},
  ZDR:{range:230000}, CC:{range:230000},
};

// ── State ────────────────────────────────────────────────────────
let map, overlay, cdTimer;
let curSta='KTLX', curPrd='REF', curTlt=1, curOp=.8;
let cdSec=REFRESH_MS/1000, busy=false;

// ── DOM ──────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const selSta=$('ss'),selPrd=$('sp'),selTlt=$('st'),osl=$('osl'),ov=$('ov'),br=$('br');
const loadEl=$('loading'),lmsg=$('lmsg'),lsub=$('lsub'),errEl=$('err');
const iSta=$('i-sta'),iScn=$('i-scn'),iTim=$('i-tim'),iChk=$('i-chk');
const iRad=$('i-rad'),iBz2=$('i-bz2'),iSts=$('i-sts'),iCd=$('i-cd'),cdf=$('cdf');

// ── Check bzip2 ──────────────────────────────────────────────────
const hasBzip2 = typeof window.Bzip2 === 'object' && typeof window.Bzip2.decompress === 'function';
iBz2.textContent = hasBzip2 ? 'OK' : 'MISSING';
iBz2.className   = 'sv ' + (hasBzip2 ? 'ok' : 'err');
if (!hasBzip2) console.error('[NEXRAD] bzip2.js not loaded! Make sure it is at the same path as index.html');

// ── Leaflet ──────────────────────────────────────────────────────
const s0 = STA.KTLX;
map = L.map('map', {center:[s0.lat,s0.lon], zoom:7});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://openstreetmap.org">OSM</a>',
  maxZoom:19
}).addTo(map);
for (const [id,s] of Object.entries(STA)) {
  L.circleMarker([s.lat,s.lon],{radius:4,color:'#00d4ff',fillColor:'#00d4ff',fillOpacity:.9,weight:1.5})
   .addTo(map).bindTooltip(id,{permanent:false,direction:'top'})
   .on('click',()=>{ selSta.value=id; curSta=id; map.setView([s.lat,s.lon],7); go(); });
}

// ── UI events ────────────────────────────────────────────────────
selSta.addEventListener('change',()=>{ curSta=selSta.value; const s=STA[curSta]; map.setView([s.lat,s.lon],7); go(); });
selPrd.addEventListener('change',()=>{ curPrd=selPrd.value; updateLegend(); go(); });
selTlt.addEventListener('change',()=>{ curTlt=parseInt(selTlt.value); go(); });
osl.addEventListener('input',()=>{ curOp=parseInt(osl.value)/100; ov.textContent=osl.value+'%'; if(overlay) overlay.setOpacity(curOp); });
br.addEventListener('click', go);

// ── Countdown ────────────────────────────────────────────────────
function startCd() {
  clearInterval(cdTimer); cdSec=REFRESH_MS/1000;
  cdTimer=setInterval(()=>{
    cdSec=Math.max(0,cdSec-1); iCd.textContent=cdSec+'s';
    cdf.style.width=(cdSec/(REFRESH_MS/1000)*100)+'%';
    if(cdSec===0){clearInterval(cdTimer); loadRadar();}
  },1000);
}
function go(){ clearInterval(cdTimer); if(!busy) loadRadar(); }

// ── Helpers ──────────────────────────────────────────────────────
function setStatus(m,c=''){iSts.className='sv'+(c?' '+c:'');iSts.textContent=m;}
function showLoad(m,s=''){busy=true;lmsg.textContent=m;lsub.textContent=s;loadEl.classList.remove('hidden');}
function hideLoad(){busy=false;loadEl.classList.add('hidden');}
function showErr(m){hideLoad();errEl.textContent='⚠ '+m;errEl.classList.add('v');setTimeout(()=>errEl.classList.remove('v'),12000);setStatus('Error','err');}

// ── Fetch wrappers (worker or direct) ────────────────────────────
async function s3list(station) {
  if (WORKER) {
    const r = await fetch(`${WORKER}/list/${station}`);
    if (!r.ok) throw new Error('Worker list failed: '+r.status);
    const j = await r.json();
    return j.keys;
  }
  // Direct S3
  let keys=[], marker='';
  for (let p=0; p<4; p++) {
    const url=`${S3_DIRECT}/?prefix=${station}/&max-keys=1000`+(marker?`&marker=${encodeURIComponent(marker)}`:'');
    const xml=await fetch(url).then(r=>{if(!r.ok)throw new Error('S3 list '+r.status);return r.text();});
    const k=[...xml.matchAll(/<Key>([^<]+)<\/Key>/g)].map(m=>m[1]);
    keys.push(...k);
    if(!xml.includes('<IsTruncated>true</IsTruncated>')||!k.length) break;
    marker=k[k.length-1];
  }
  return keys;
}

async function s3chunk(key) {
  const url = WORKER ? `${WORKER}/chunk/${key}` : `${S3_DIRECT}/${key}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('Chunk fetch failed: '+r.status);
  return r.arrayBuffer();
}

// ── Find latest complete scan ────────────────────────────────────
function chunkNum(k){ const m=k.match(/-(\d{3})-[SIE]$/); return m?parseInt(m[1]):999; }
function sortChunks(ch){ return [...ch].sort((a,b)=>chunkNum(a)-chunkNum(b)); }

async function findLatestScan(station) {
  showLoad('Scanning S3…', station);
  const keys = await s3list(station);
  if (!keys.length) throw new Error('No S3 keys for '+station);

  const scanMap = new Map();
  for (const k of keys) {
    const parts=k.split('/'); if(parts.length<3) continue;
    const n=parseInt(parts[1]); if(!isNaN(n)){if(!scanMap.has(n))scanMap.set(n,[]);scanMap.get(n).push(k);}
  }
  const sorted=[...scanMap.keys()].sort((a,b)=>b-a);
  for (const n of sorted) {
    const ch=scanMap.get(n);
    if(ch.some(k=>k.endsWith('-S'))&&ch.some(k=>k.endsWith('-E')))
      return {scanNum:n, chunks:sortChunks(ch)};
  }
  return {scanNum:sorted[0], chunks:sortChunks(scanMap.get(sorted[0]))};
}

// ── Fetch chunks ─────────────────────────────────────────────────
async function fetchChunks(chunks, limit) {
  const todo=chunks.slice(0,limit), bufs=[];
  for (let i=0; i<todo.length; i++) {
    lsub.textContent=`Chunk ${i+1} / ${todo.length}`;
    iChk.textContent=`${i+1}/${todo.length}`;
    try { bufs.push(await s3chunk(todo[i])); } catch(e){ console.warn('chunk skip:',e.message); }
    if(todo[i].endsWith('-E')&&i>=4) break;
  }
  if(!bufs.length) throw new Error('No chunks fetched');
  return bufs;
}

// ── AR2V0006 manual parser ────────────────────────────────────────
// Parses decompressed NEXRAD Level-2 binary data.
// Returns { azimuth, data, gate_size, first_gate } for the requested tilt+product.
function parseAR2V(raw, tilt, product) {
  if (!hasBzip2) throw new Error('bzip2.js not loaded — make sure bzip2.js is at the same path as index.html');

  const view    = new DataView(raw.buffer, raw.byteOffset, raw.byteLength);
  const elevs   = new Map();
  let   pos     = 0;

  // Skip 24-byte file header (AR2V0006.NNN + station + misc)
  if (raw.byteLength > 4 && String.fromCharCode(raw[0],raw[1],raw[2],raw[3]) === 'AR2V') pos = 24;

  // Process compressed/uncompressed LDM records
  let recCount = 0;
  while (pos + 4 <= raw.byteLength) {
    let sz;
    try { sz = view.getInt32(pos, false); } catch(e) { break; }
    pos += 4;
    if (!sz) break;
    const absLen = Math.abs(sz);
    if (pos + absLen > raw.byteLength) break;
    const slice = raw.slice(pos, pos + absLen);
    pos += absLen;

    let block;
    if (sz < 0) {
      // bzip2 compressed
      try { block = window.Bzip2.decompress(slice); }
      catch(e) { console.warn('[NEXRAD] bzip2 decomp error:', e.message); continue; }
    } else {
      block = slice;
    }
    recCount++;

    // Parse 2432-byte message records within decompressed block
    const bv = new DataView(block.buffer, block.byteOffset, block.byteLength);
    for (let r = 0; r + 2432 <= block.byteLength; r += 2432) {
      const msgType = block[r + 15]; // offset 15 in record = message type
      if (msgType === 31) parseMsg31(block, bv, r + 28, elevs);
    }
  }

  console.log('[NEXRAD] records processed:', recCount, '| elevations found:', elevs.size, [...elevs.keys()]);
  if (!elevs.size) throw new Error('No Message 31 records decoded. Records seen: '+recCount);

  const elevKeys = [...elevs.keys()].sort((a,b)=>a-b);
  const tKey     = elevKeys[Math.min(tilt-1, elevKeys.length-1)];
  const elev     = elevs.get(tKey);

  const momentKey = {REF:'ref',VEL:'vel',ZDR:'zdr',CC:'cc'}[product] || 'ref';
  const hasProduct = elev[momentKey]?.some(g=>g&&g.length>0);
  const data = hasProduct ? elev[momentKey] : elev.ref;

  return {
    azimuth:    new Float32Array(elev.azimuth),
    data:       data,
    gate_size:  elev.gs || 250,
    first_gate: elev.fg || 2125,
  };
}

function parseMsg31(data, view, base, elevs) {
  if (base + 68 > data.byteLength) return;
  try {
    const az = view.getFloat32(base + 12, false);
    const en = data[base + 22];
    const nb = view.getUint16(base + 30, false);
    if (az < 0 || az >= 360 || en < 1 || en > 25 || nb < 1 || nb > 10) return;
    if (!elevs.has(en)) elevs.set(en, {azimuth:[],ref:[],vel:[],zdr:[],cc:[],fg:2125,gs:250});
    const el = elevs.get(en);
    el.azimuth.push(az);
    const mo = {ref:null,vel:null,zdr:null,cc:null};
    for (let i = 0; i < Math.min(nb, 9); i++) {
      const ptr = view.getUint32(base + 32 + i*4, false);
      if (!ptr) continue;
      const bb = base + ptr;
      if (bb + 28 > data.byteLength) continue;
      if (String.fromCharCode(data[bb]) !== 'D') continue;
      const bn  = String.fromCharCode(data[bb+1],data[bb+2],data[bb+3]).replace(/\0/g,'').trim().toUpperCase();
      const ng  = view.getUint16(bb + 6, false);
      const fg  = view.getUint16(bb + 8, false);
      const gs  = view.getUint16(bb + 10, false);
      const ws  = data[bb + 17];
      const sc  = view.getFloat32(bb + 18, false);
      const off = view.getFloat32(bb + 22, false);
      if (ng<1||ng>3600||(ws!==8&&ws!==16)||sc===0) continue;
      const ds = bb + 28;
      if (ds + ng*(ws===16?2:1) > data.byteLength) continue;
      const dec = new Float32Array(ng);
      for (let g=0; g<ng; g++) {
        const raw = ws===16 ? view.getUint16(ds+g*2,false) : data[ds+g];
        dec[g] = raw < 2 ? NaN : (raw - off) / sc;
      }
      if (bn==='REF'){mo.ref=dec;el.fg=fg;el.gs=gs;}
      else if(bn==='VEL') mo.vel=dec;
      else if(bn==='ZDR') mo.zdr=dec;
      else if(bn==='RHO'||bn==='CC') mo.cc=dec;
    }
    for (const k of['ref','vel','zdr','cc']) el[k].push(mo[k]);
  } catch(e) {}
}

// ── Canvas renderer ──────────────────────────────────────────────
function render(azimuth, data, gateSize, firstGate, product, rangeM) {
  const SZ=1100, cx=SZ/2, cy=SZ/2, sc=SZ/(2*rangeM);
  const canvas=document.createElement('canvas'); canvas.width=SZ; canvas.height=SZ;
  const ctx=canvas.getContext('2d');
  const img=ctx.createImageData(SZ,SZ); const px=img.data;
  const nR=azimuth.length; if(!nR) return canvas;
  const bhw=(nR>500?.25:.5)*Math.PI/180;

  for (let r=0; r<nR; r++) {
    const gates=data[r]; if(!gates) continue;
    const az=azimuth[r]*Math.PI/180;
    for (let g=0; g<gates.length; g++) {
      const col=colorOf(gates[g],product); if(!col) continue;
      const rN=(firstGate+g*gateSize)*sc, rF=(firstGate+(g+1)*gateSize)*sc;
      if(rN>SZ/2) break;
      const as=Math.max(2,Math.round(rN*bhw*2)), rs=Math.max(1,Math.round(rF-rN));
      for (let ai=0; ai<=as; ai++) {
        const a=az-bhw+ai*(2*bhw/as), sa=Math.sin(a), ca=Math.cos(a);
        for (let ri=0; ri<=rs; ri++) {
          const rng=rN+ri, x=Math.round(cx+sa*rng), y=Math.round(cy-ca*rng);
          if(x<0||x>=SZ||y<0||y>=SZ) continue;
          const i=(y*SZ+x)*4;
          px[i]=col[0]; px[i+1]=col[1]; px[i+2]=col[2]; px[i+3]=col[3];
        }
      }
    }
  }
  ctx.putImageData(img,0,0); return canvas;
}

function colorOf(v,p){
  if(v==null||isNaN(v)) return null;
  if(p==='VEL') return vc(v);
  if(p==='ZDR') return zc(v);
  if(p==='CC')  return cc(v);
  return rc(v);
}
function rc(d){if(d<5)return null;if(d<10)return[0,236,236,200];if(d<20)return[1,159,244,210];if(d<30)return[3,0,244,220];if(d<40)return[2,253,2,220];if(d<45)return[1,197,1,230];if(d<50)return[255,255,0,235];if(d<55)return[231,192,0,240];if(d<60)return[255,144,0,245];if(d<65)return[255,0,0,250];if(d<70)return[214,0,0,255];return[255,0,255,255];}
function vc(v){if(v<-27)return[255,0,255,240];if(v<-20)return[255,0,0,235];if(v<-10)return[255,170,0,225];if(v<-2)return[0,255,0,210];if(v<2)return null;if(v<10)return[0,170,255,210];if(v<20)return[0,0,255,225];if(v<27)return[170,0,255,235];return[255,0,255,240];}
function zc(z){if(z<0)return[102,0,204,220];if(z<.5)return[0,0,255,225];if(z<1)return[0,170,255,225];if(z<2)return[0,255,0,230];if(z<3)return[255,255,0,235];if(z<4)return[255,136,0,240];return[255,0,0,245];}
function cc(c){if(c<.7)return[255,0,255,220];if(c<.8)return[255,0,0,225];if(c<.9)return[255,170,0,230];if(c<.95)return[255,255,0,235];if(c<.97)return[0,255,0,240];return[0,255,255,245];}

// ── Overlay ──────────────────────────────────────────────────────
function placeOnMap(canvas, station, product) {
  const s=STA[station], rng=PRD[product].range;
  const ld=(rng/1000)/111.32, lnd=(rng/1000)/(111.32*Math.cos(s.lat*Math.PI/180));
  const bounds=[[s.lat-ld,s.lon-lnd],[s.lat+ld,s.lon+lnd]];
  const url=canvas.toDataURL('image/png');
  if(overlay){overlay.setUrl(url);overlay.setBounds(bounds);}
  else overlay=L.imageOverlay(url,bounds,{opacity:curOp,interactive:false}).addTo(map);
  overlay.setOpacity(curOp);
}

// ── Legend ────────────────────────────────────────────────────────
const LEGS={
  REF:{t:'REF (dBZ)',e:[['#00ecec','10-20'],['#019ff4','20-30'],['#0300f4','30-40'],['#02fd02','40-45'],['#01c501','45-50'],['#ffff00','50-55'],['#ff9000','55-60'],['#ff0000','60-65'],['#d60000','65-70'],['#ff00ff','>70']]},
  VEL:{t:'VEL (m/s)',e:[['#ff00ff','<-27'],['#ff0000','-20..-27'],['#ffaa00','-10..-20'],['#00ff00','-2..-10'],['#00aaff','+2..+10'],['#0000ff','+10..+20'],['#aa00ff','+20..+27'],['#ff00ff','>+27']]},
  ZDR:{t:'ZDR (dB)',e:[['#6600cc','<0'],['#0000ff','0-0.5'],['#00aaff','0.5-1'],['#00ff00','1-2'],['#ffff00','2-3'],['#ff8800','3-4'],['#ff0000','>4']]},
  CC: {t:'CC (ρhv)',e:[['#ff00ff','<0.70'],['#ff0000','0.70-0.80'],['#ffaa00','0.80-0.90'],['#ffff00','0.90-0.95'],['#00ff00','0.95-0.97'],['#00ffff','>0.97']]},
};
function updateLegend(){
  const d=LEGS[curPrd]||LEGS.REF; $('lt').textContent=d.t;
  $('lb').innerHTML=d.e.map(([c,l])=>`<div class="lr"><div class="ls" style="background:${c}"></div><span class="ll">${l}</span></div>`).join('');
}

// ── Main ─────────────────────────────────────────────────────────
async function loadRadar() {
  if (busy) return;
  clearInterval(cdTimer);
  try {
    const sta=curSta, prd=curPrd, tlt=curTlt;
    iSta.textContent=sta; setStatus('Fetching…','warn');

    const {scanNum, chunks} = await findLatestScan(sta);
    iScn.textContent='#'+scanNum;
    const tm=chunks[0]?.match(/(\d{8})-(\d{6})/);
    if(tm){const[,d,t]=tm;iTim.textContent=`${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6)} ${t.slice(0,2)}:${t.slice(2,4)}Z`;}

    const limit = tlt===1 ? 20 : Math.min(10+tlt*12, 50);
    showLoad('Fetching chunks…', `0/${Math.min(limit,chunks.length)}`);
    setStatus('Downloading…','warn');
    const bufs = await fetchChunks(chunks, limit);

    // Concatenate all chunks into one Uint8Array
    const total = bufs.reduce((s,b)=>s+b.byteLength, 0);
    const raw   = new Uint8Array(total);
    let   off   = 0;
    for (const b of bufs) { raw.set(new Uint8Array(b), off); off+=b.byteLength; }

    showLoad('Parsing…', `${bufs.length} chunks / ${(total/1024).toFixed(0)} KB`);
    setStatus('Parsing…','warn');
    await new Promise(r=>setTimeout(r,0)); // yield to render spinner

    const {azimuth, data, gate_size, first_gate} = parseAR2V(raw, tlt, prd);
    iRad.textContent = azimuth.length;
    if (!azimuth.length) throw new Error('0 radials decoded — check console');

    showLoad('Rendering…', azimuth.length+' radials');
    setStatus('Rendering…','warn');
    await new Promise(r=>setTimeout(r,0));

    const canvas = render(azimuth, data, gate_size, first_gate, prd, PRD[prd].range);
    placeOnMap(canvas, sta, prd);
    hideLoad(); setStatus('Live','ok');
    startCd();
  } catch(e) {
    console.error('[NEXRAD] Error:', e);
    showErr(e.message || String(e));
    startCd();
  }
}

updateLegend();
loadRadar();
</script>
