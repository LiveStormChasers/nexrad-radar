</div>

<script>
// ── Stations ──────────────────────────────────────────────────────────────

8.24],KMPX:[44.85,-93.56],KMQT:[46.53,-87.55],KMRX:[36.17,-83.4],KMSX:[47.04,-113.99],KMTX:[41.26,-112.45],KMUX:[37.15,-121.9],KMVX:[47.53,-97.33],KMXX:[32.54,-85.79],KNKX:[32.92,-117.04],KNQA:[35.35,-89.87],KOAX:[41.32,-96.37],KOHX:[36.25,-86.56],KOKX:[40.87,-72.86],KOTX:[47.68,-117.63],KPAH:[37.07,-88.77],KPBZ:[40.53,-80.22],KPDT:[45.69,-118.85],KPOE:[31.16,-92.98],KPUX:[38.46,-104.18],KRAX:[35.66,-78.49],KRGX:[39.75,-119.46],KRIW:[43.07,-108.48],KRLX:[38.31,-81.72],KRTX:[45.71,-122.97],KSFX:[43.1,-112.69],KSGF:[37.23,-93.4],KSHV:[32.45,-93.84],KSJT:[31.37,-100.49],KSOX:[33.82,-117.64],KSRX:[35.29,-94.36],KTBW:[27.71,-82.4],KTFX:[47.46,-111.38],KTLX:[35.33,-97.28],KTWX:[38.99,-96.23],KTYX:[43.76,-75.68],KUDX:[44.12,-102.83],KUEX:[40.32,-98.44],KVAX:[30.89,-83.0],KVBX:[34.84,-120.4],KVNX:[36.74,-98.13],KVTX:[34.41,-119.18],KVWX:[38.26,-87.72],KYUX:[32.5,-114.66]};

// ── State ─────────────────────────────────────────────────────────────────
let map, radarCanvas = null, radarCtx = null;
let curSite = null, curLat = 0, curLng = 0;
let frames  = [];      // [{key, label, compactBuf, msgType, maxRangeKm}]
let frameIdx = 0;
let playing = false, playTimer = null;
let dragging = false;
let worker = null;
let workerQ = [];

// ── Map ───────────────────────────────────────────────────────────────────
window.onload = () => {
  map = L.map('map', {center:[38,-96], zoom:5, zoomControl:true});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    {subdomains:'abcd', maxZoom:19, attribution:'© CartoDB'}).addTo(map);

  // Place station markers
  for (const [id, [lat, lng]] of Object.entries(STATIONS)) {
    const icon = L.divIcon({
      className: '',
      html: `<div class="site-pill" id="pill-${id}"><div class="site-dot"></div>${id}</div>`,
      iconAnchor: [0, 8]
    });
    L.marker([lat,lng], {icon, zIndexOffset:100}).addTo(map)
      .on('click', () => selectSite(id));
  }

  // Slider events
  initSlider();

  // Spin up the worker
  spawnWorker();
};

// ── Worker pool (single worker, queue) ────────────────────────────────────
function spawnWorker() {
  worker = new Worker('radarWorker.js');
  worker.onmessage = (e) => {
    const { id, rendered, error } = e.data;
    const job = workerQ.find(j => j.id === id);
    if (!job) return;
    workerQ = workerQ.filter(j => j.id !== id);
    if (error) job.reject(new Error(error));
    else        job.resolve(rendered);
  };
}

let workerIdCounter = 0;
function runWorker(msg) {
  return new Promise((resolve, reject) => {
    const id = ++workerIdCounter;
    workerQ.push({id, resolve, reject});
    worker.postMessage({id, ...msg}); // no transfer — reuse buffer across zoom/pan
  });
}

// ── Station select ─────────────────────────────────────────────────────────
async function selectSite(id) {
  stopPlay();
  curSite = id;
  [curLat, curLng] = STATIONS[id];
  document.querySelectorAll('.site-pill').forEach(p => p.classList.remove('sel'));
  const pill = document.getElementById('pill-'+id);
  if (pill) pill.classList.add('sel');
  document.getElementById('curSite').textContent = id;
  document.getElementById('curSite').style.color = '#c8daea';
  // Update floating station card
  const stName = id; // could add full city names later
  document.getElementById('scName').textContent = id;
  document.getElementById('stationCard').style.display = 'block';
  map.setView([curLat, curLng], 8);

  // Clear old frames
  frames = [];
  frameIdx = 0;
  clearRadar();
  setStatus('Loading frame list...');
  buildTicks(0);

  try {
    const r = await fetch(`/radar/list/${id}`);
    const keys = await r.json();
    if (!keys.length) { setStatus('No data'); return; }

    // Build frame stubs
    frames = keys.map(key => ({
      key,
      label: keyToLabel(key),
      compactBuf: null,
      msgType: null,
      maxRangeKm: 460
    }));
    buildTicks(frames.length);
    setFrame(frames.length - 1, true);
    setStatus('Loading latest...');

    // Load latest frame FIRST — show radar immediately
    const latestIdx = frames.length - 1;
    try {
      await fetchAndRender(latestIdx);
      updateTickLoaded(latestIdx);
      redrawCurrentFrame();
      setStatus('');
    } catch(e) {
      setStatus('Error loading latest frame');
    }

    // Then load the rest newest→oldest, 3 at a time
    const remaining = [];
    for (let i = frames.length - 2; i >= 0; i--) remaining.push(i);

    async function loadBatch(indices) {
      for (let i = 0; i < indices.length; i += 3) {
        const batch = indices.slice(i, i + 3);
        await Promise.allSettled(batch.map(fi =>
          fetchAndRender(fi).then(() => {
            updateTickLoaded(fi);
            if (fi === frameIdx) redrawCurrentFrame();
          }).catch(()=>{})
        ));
      }
    }
    loadBatch(remaining);
  } catch(e) {
    setStatus('Error: ' + e.message);
  }
}

async function fetchAndRender(fi) {
  const f = frames[fi];
  const processUrl = `/radar/process/${curSite}/${f.key}`;
  const fileUrl    = `/radar/file/${curSite}/${f.key}`;

  try {
    const r = await fetch(processUrl);
    if (r.ok) {
      f.compactBuf = await r.arrayBuffer();
      f.msgType    = 'compact';
      // Parse maxRangeKm from compact binary header (offset 20)
      f.maxRangeKm = new DataView(f.compactBuf).getFloat32(20, true);
    } else throw new Error('process returned ' + r.status);
  } catch(e) {
    // Fallback: raw Level-2
    const r2 = await fetch(fileUrl);
    if (!r2.ok) throw new Error('HTTP ' + r2.status);
    f.compactBuf = await r2.arrayBuffer();
    f.msgType    = 'level2';
    f.maxRangeKm = 460;
  }
}

function keyToLabel(key) {
  // NOMADS format: KXXX_YYYYMMDD_HHMMSS.bz2
  const m = key.match(/(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})/);
  if (!m) return key;
  const [,yr,mo,dy,hh,mm] = m;
  const d = new Date(Date.UTC(+yr,+mo-1,+dy,+hh,+mm));
  return d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true,timeZoneName:'short'});
}

// ── Viewport-resolution canvas rendering ─────────────────────────────────
// Matches OpenSnow: for each screen pixel, sample exactly one radar gate.
// No fixed canvas size — re-renders at actual screen resolution on every zoom/pan.

let renderSeq = 0; // cancel stale renders
let renderDebounceTimer = null;

function ensureRadarCanvas() {
  if (radarCanvas) return;
  radarCanvas = document.createElement('canvas');
  radarCanvas.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;z-index:400';
  map.getPanes().overlayPane.appendChild(radarCanvas);
  radarCtx = radarCanvas.getContext('2d');
  map.on('moveend zoomend resize', scheduleRender);
}

function scheduleRender() {
  clearTimeout(renderDebounceTimer);
  renderDebounceTimer = setTimeout(triggerViewportRender, 60);
}

async function triggerViewportRender() {
  if (!radarCanvas || !curSite) return;
  const f = frames[frameIdx];
  if (!f || !f.compactBuf) return;

  const seq = ++renderSeq;
  const size = map.getSize();
  const b    = map.getBounds();

  radarCanvas.width  = size.x;
  radarCanvas.height = size.y;
  L.DomUtil.setPosition(radarCanvas, map.containerPointToLayerPoint([0, 0]));

  const msgType = f.msgType === 'compact' ? 'viewport' : 'viewport_level2';

  try {
    const result = await runWorker({
      buffer: f.compactBuf,
      type: msgType,
      radarLat: curLat, radarLng: curLng,
      bounds: { north: b.getNorth(), south: b.getSouth(), east: b.getEast(), west: b.getWest() },
      width: size.x, height: size.y
    });

    if (seq !== renderSeq) return; // stale — newer render in flight
    const imgData = new ImageData(new Uint8ClampedArray(result.pixels), result.width, result.height);
    radarCtx.clearRect(0, 0, radarCanvas.width, radarCanvas.height);
    radarCtx.putImageData(imgData, 0, 0);
  } catch(e) {
    console.error('Render error:', e.message);
  }
}

function redrawCurrentFrame() {
  if (!frames.length || !frames[frameIdx]) return;
  const f = frames[frameIdx];
  if (!f.compactBuf) return;
  ensureRadarCanvas();
  triggerViewportRender();
}

function clearRadar() {
  if (!radarCanvas) return;
  map.getPanes().overlayPane.removeChild(radarCanvas);
  map.off('moveend zoomend resize', scheduleRender);
  radarCanvas = null; radarCtx = null;
}

// ── Slider ─────────────────────────────────────────────────────────────────
function initSlider() {
  const track = document.getElementById('track');
  track.addEventListener('mousedown', e => { dragging=true; scrub(e); });
  window.addEventListener('mousemove', e => { if(dragging) scrub(e); });
  window.addEventListener('mouseup',   () => { dragging=false; });
  track.addEventListener('touchstart', e => { dragging=true; scrub(e.touches[0]); },{passive:true});
  window.addEventListener('touchmove', e => { if(dragging) scrub(e.touches[0]); },{passive:true});
  window.addEventListener('touchend',  () => { dragging=false; });

  document.getElementById('b0').onclick    = () => setFrame(0);
  document.getElementById('b1').onclick    = () => setFrame(frameIdx-1);
  document.getElementById('bPlay').onclick = togglePlay;
  document.getElementById('b2').onclick    = () => setFrame(frameIdx+1);
  document.getElementById('b3').onclick    = () => setFrame(frames.length-1);
}

function scrub(e) {
  if (!frames.length) return;
  const r   = document.getElementById('track').getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  setFrame(Math.round(pct * (frames.length-1)));
}

function buildTicks(n) {
  const el = document.getElementById('ticks');
  el.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const pct  = n === 1 ? 0 : i/(n-1)*100;
    const tk   = document.createElement('div');
    tk.className = 'tk' + (i===frameIdx?' on':'');
    tk.id = 'tk-'+i;
    tk.style.cssText = `left:${pct}%;height:${i%5===0?9:5}px`;
    el.appendChild(tk);
  }
}

function updateTickLoaded(i) {
  const t = document.getElementById('tk-'+i);
  if (t && !t.classList.contains('on')) t.classList.add('loaded');
}

function setFrame(idx, force) {
  if (!frames.length) return;
  idx = Math.max(0, Math.min(frames.length-1, idx));
  if (idx===frameIdx && !force) return;
  frameIdx = idx;

  const pct = frames.length===1 ? 0 : idx/(frames.length-1)*100;
  document.getElementById('fill').style.width  = pct+'%';
  document.getElementById('thumb').style.left  = pct+'%';
  const lbl = frames[idx]?.label || '';
  document.getElementById('scSub').textContent = lbl ? `Reflectivity • 0.5° · ${lbl}` : 'Reflectivity • 0.5°';

  // Update tick highlights
  document.querySelectorAll('.tk').forEach((t,i) => {
    t.classList.toggle('on', i===idx);
    if (i===idx) t.classList.remove('loaded');
  });

  const isLive = idx===frames.length-1;
  document.getElementById('liveTag').style.display = isLive ? '' : 'none';

  redrawCurrentFrame();

  // On-demand fetch if frame not loaded yet
  if (!frames[idx]?.compactBuf) {
    setStatus('Loading...');
    fetchAndRender(idx).then(() => {
      updateTickLoaded(idx);
      if (idx === frameIdx) { redrawCurrentFrame(); setStatus(''); }
    }).catch(()=>setStatus(''));
  }
}

function togglePlay() {
  playing ? stopPlay() : startPlay();
}
function startPlay() {
  if (!frames.length) return;
  playing = true;
  document.getElementById('bPlay').innerHTML = '⏸';
  document.getElementById('bPlay').classList.add('on');
  if (frameIdx >= frames.length-1) setFrame(0, true);
  playTimer = setInterval(() => {
    if (frameIdx >= frames.length-1) { stopPlay(); return; }
    setFrame(frameIdx+1);
  }, 600);
}
function stopPlay() {
  playing = false;
  clearInterval(playTimer);
  document.getElementById('bPlay').innerHTML = '▶';
  document.getElementById('bPlay').classList.remove('on');
}

function setStatus(msg) {
  document.getElementById('loadStatus').textContent = msg;
}

function onProduct() { /* velocity not yet implemented */ }
</script>
