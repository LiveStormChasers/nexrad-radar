<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEXRAD Live Radar</title>
<link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0c0f;color:#e0e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#bar{display:flex;align-items:center;gap:12px;padding:7px 16px;background:#111418dd;border-bottom:1px solid #ffffff12;flex-shrink:0;backdrop-filter:blur(10px);z-index:1000;position:relative}
.logo{font-size:15px;font-weight:800;color:#2df0ff;letter-spacing:.08em}
#stSite{font-size:13px;font-weight:700;color:#fff}
#stTime{font-size:11px;color:#6a7a8a;margin-left:4px}
.spacer{flex:1}
select,button{background:#1a2230;border:1px solid #2a3a50;color:#d0e0f0;font-size:11px;padding:5px 10px;border-radius:20px;cursor:pointer;font-family:inherit;outline:none}
select:hover,button:hover{border-color:#2df0ff55}
#map{flex:1;position:relative}

/* LEGEND */
#legend{position:absolute;top:12px;left:12px;z-index:800;background:#111418cc;border:1px solid #ffffff15;border-radius:12px;padding:8px 12px;backdrop-filter:blur(8px);pointer-events:none}
#legend-bar{width:200px;height:8px;border-radius:4px;margin-bottom:4px;background:linear-gradient(to right,
  #a8ab98 0%,
  #6b85a0 12%,
  #5085a0 18%,
  #2db64e 28%,
  #127618 35%,
  #9bbf03 42%,
  #e6df00 48%,
  #d77805 58%,
  #c62513 65%,
  #8e271d 70%,
  #c76a9b 75%,
  #c32f7c 80%,
  #811ec9 85%,
  #51139d 88%,
  #76e0e7 93%,
  #730a01 100%)}
#legend-labels{display:flex;justify-content:space-between;font-size:9px;color:#6a7a8a;width:200px}

/* SLIDER BAR */
#sliderBar{flex-shrink:0;background:#0e1218;border-top:1px solid #ffffff10;padding:8px 16px 10px;display:flex;flex-direction:column;gap:6px}
#sliderRow{display:flex;align-items:center;gap:10px}
#sliderTrack{flex:1;position:relative;height:6px;background:#1a2230;border-radius:3px;cursor:pointer}
#sliderFill{position:absolute;left:0;top:0;height:100%;background:#2df0ff;border-radius:3px;pointer-events:none}
#sliderThumb{position:absolute;top:50%;width:14px;height:14px;background:#fff;border:2px solid #2df0ff;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 6px #2df0ff88}
#sliderTicks{flex:1;position:relative;height:16px;margin-top:-4px}
.tick{position:absolute;top:0;width:2px;height:6px;background:#2a3a50;border-radius:1px;transform:translateX(-50%)}
.tick.active{background:#2df0ff88}
.tick.has-data{background:#3a5a70}
#sliderMeta{display:flex;align-items:center;gap:12px}
.ctrl-btn{background:none;border:none;color:#6a8aaa;font-size:16px;cursor:pointer;padding:2px 6px;border-radius:6px;line-height:1}
.ctrl-btn:hover{color:#2df0ff;background:#2df0ff15}
.ctrl-btn.active{color:#2df0ff}
#frameTime{font-size:11px;color:#8aaabb;min-width:130px}
#liveTag{font-size:10px;font-weight:700;color:#2df0ff;background:#2df0ff20;border:1px solid #2df0ff40;border-radius:10px;padding:2px 8px}

/* STATION MARKERS — pill style */
.site-pill{
  display:inline-flex;align-items:center;gap:4px;
  background:#0e1520cc;border:1.5px solid #2df0ff55;
  border-radius:20px;padding:2px 7px 2px 4px;
  font-size:10px;font-weight:700;color:#2df0ff;
  cursor:pointer;white-space:nowrap;
  backdrop-filter:blur(4px);
  transition:all .15s;box-shadow:0 0 6px #00000088;
}
.site-pill:hover{background:#1a2a3ccc;border-color:#2df0ff;color:#fff}
.site-pill.selected{background:#2df0ff22;border-color:#2df0ff;color:#fff;box-shadow:0 0 10px #2df0ff55}
.site-dot{width:7px;height:7px;border-radius:50%;background:#2df0ff;flex-shrink:0}
.site-pill.selected .site-dot{background:#fff;box-shadow:0 0 4px #2df0ff}
.leaflet-div-icon{background:transparent!important;border:none!important}
</style>
</head>
<body>

<div id="bar">
  <div class="logo">⚡ NEXRAD</div>
  <select id="product" onchange="changeProduct()">
    <option value="sr_bref">Reflectivity</option>
    <option value="sr_vel">Velocity</option>
  </select>
  <div id="stSite">← Click a station</div>
  <div id="stTime"></div>
  <div class="spacer"></div>
  <div id="liveTag">LIVE</div>
</div>

<div id="map">
  <div id="legend">
    <div id="legend-bar"></div>
    <div id="legend-labels"><span>−28</span><span>0</span><span>20</span><span>40</span><span>60</span><span>75 dBZ</span></div>
  </div>
</div>

<div id="sliderBar">
  <div id="sliderRow">
    <button class="ctrl-btn" id="btnFirst" title="Oldest">⏮</button>
    <button class="ctrl-btn" id="btnPlay" title="Play">▶</button>
    <button class="ctrl-btn" id="btnLast" title="Live">⏭</button>
    <div id="sliderTrack">
      <div id="sliderFill"></div>
      <div id="sliderThumb"></div>
      <div id="sliderTicks"></div>
    </div>
  </div>
  <div id="sliderMeta">
    <div id="frameTime">No station selected</div>
  </div>
</div>

<script>
// ── STATIONS ─────────────────────────────────────────────
const STATIONS = {
  KABR:[45.46,-98.41],KABX:[35.15,-106.82],KAKQ:[36.98,-77.01],KAMA:[35.23,-101.71],
  KAMX:[25.61,-80.41],KAPX:[44.91,-84.72],KARX:[43.82,-91.19],KATX:[48.19,-122.49],
  KBBX:[39.49,-121.63],KBGM:[42.2,-75.99],KBHX:[40.5,-124.29],KBIS:[46.77,-100.76],
  KBLX:[45.85,-108.61],KBMX:[33.17,-86.77],KBOX:[41.96,-71.14],KBRO:[25.92,-97.42],
  KBUF:[42.95,-78.74],KBYX:[24.6,-81.7],KCAE:[33.95,-81.12],KCBW:[46.04,-67.81],
  KCBX:[43.49,-116.23],KCCX:[40.92,-78.0],KCLE:[41.41,-81.86],KCLX:[32.66,-81.04],
  KCRP:[27.78,-97.51],KCXX:[44.51,-73.17],KCYS:[41.15,-104.81],KDAX:[38.5,-121.68],
  KDDC:[37.76,-99.97],KDFX:[29.27,-100.28],KDGX:[32.28,-89.98],KDIX:[39.95,-74.41],
  KDLH:[46.84,-92.21],KDMX:[41.73,-93.72],KDOX:[38.82,-75.44],KDTX:[42.7,-83.47],
  KDVN:[41.61,-90.58],KDYX:[32.54,-99.25],KEAX:[38.81,-94.26],KEMX:[31.89,-110.63],
  KENX:[42.59,-74.06],KEOX:[31.46,-85.46],KEPZ:[31.87,-106.7],KESX:[35.7,-114.89],
  KEVX:[30.56,-85.92],KEWX:[29.7,-98.03],KEYX:[35.1,-117.56],KFCX:[37.02,-80.27],
  KFDR:[34.36,-98.97],KFDX:[34.63,-103.63],KFFC:[33.36,-84.57],KFSD:[43.59,-96.73],
  KFSX:[34.57,-111.2],KFTG:[39.79,-104.55],KFWS:[32.57,-97.3],KGGW:[48.21,-106.63],
  KGJX:[39.06,-108.21],KGLD:[39.37,-101.7],KGRB:[44.5,-88.11],KGRK:[30.72,-97.38],
  KGRR:[42.89,-85.54],KGSP:[34.88,-82.22],KGWX:[33.9,-88.33],KGYX:[43.89,-70.26],
  KHDC:[30.54,-87.99],KHDX:[33.08,-106.12],KHGX:[29.47,-95.08],KHNX:[36.31,-119.63],
  KHPX:[36.74,-87.28],KHTX:[34.93,-86.08],KICT:[37.65,-97.44],KICX:[37.59,-112.86],
  KILN:[39.42,-83.82],KILX:[40.15,-89.34],KIND:[39.7,-86.28],KINX:[36.18,-95.56],
  KIWA:[33.29,-111.67],KIWX:[41.36,-85.7],KJAX:[30.48,-81.7],KJGX:[32.68,-83.35],
  KJKL:[37.59,-83.31],KLBB:[33.65,-101.81],KLCH:[30.12,-93.22],KLGX:[47.12,-124.11],
  KLNX:[41.96,-100.58],KLOT:[41.6,-88.08],KLRX:[40.74,-116.8],KLSX:[38.7,-90.68],
  KLTX:[33.99,-78.43],KLVX:[37.97,-85.94],KLWX:[38.98,-77.48],KLZK:[34.84,-92.26],
  KMAF:[31.94,-102.19],KMAX:[42.08,-122.72],KMBX:[48.39,-100.86],KMHX:[34.78,-76.88],
  KMKX:[42.97,-88.55],KMLB:[28.11,-80.65],KMOB:[30.68,-88.24],KMPX:[44.85,-93.56],
  KMQT:[46.53,-87.55],KMRX:[36.17,-83.4],KMSX:[47.04,-113.99],KMTX:[41.26,-112.45],
  KMUX:[37.15,-121.9],KMVX:[47.53,-97.33],KMXX:[32.54,-85.79],KNKX:[32.92,-117.04],
  KNQA:[35.35,-89.87],KOAX:[41.32,-96.37],KOHX:[36.25,-86.56],KOKX:[40.87,-72.86],
  KOTX:[47.68,-117.63],KPAH:[37.07,-88.77],KPBZ:[40.53,-80.22],KPDT:[45.69,-118.85],
  KPOE:[31.16,-92.98],KPUX:[38.46,-104.18],KRAX:[35.66,-78.49],KRGX:[39.75,-119.46],
  KRIW:[43.07,-108.48],KRLX:[38.31,-81.72],KRTX:[45.71,-122.97],KSFX:[43.1,-112.69],
  KSGF:[37.23,-93.4],KSHV:[32.45,-93.84],KSJT:[31.37,-100.49],KSOX:[33.82,-117.64],
  KSRX:[35.29,-94.36],KTBW:[27.71,-82.4],KTFX:[47.46,-111.38],KTLX:[35.33,-97.28],
  KTWX:[38.99,-96.23],KTYX:[43.76,-75.68],KUDX:[44.12,-102.83],KUEX:[40.32,-98.44],
  KVAX:[30.89,-83.0],KVBX:[34.84,-120.4],KVNX:[36.74,-98.13],KVTX:[34.41,-119.18],
  KVWX:[38.26,-87.72],KYUX:[32.5,-114.66]
};

// ── STATE ────────────────────────────────────────────────
let map, wmsLayer, currentSite = null;
let siteMarkers = {};
let frames = [];        // [{time, label}]
let frameIdx = 0;
let playing = false;
let playTimer = null;
let liveTimer = null;

// ── MAP INIT ─────────────────────────────────────────────
window.onload = () => {
  map = L.map('map', {center:[38,-96], zoom:5, zoomControl:true});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    {subdomains:'abcd',maxZoom:19,attribution:'© CartoDB'}).addTo(map);

  // Place pill markers for every station
  for (const [id, [lat, lng]] of Object.entries(STATIONS)) {
    const icon = L.divIcon({
      className: '',
      html: `<div class="site-pill" id="pill-${id}"><div class="site-dot"></div>${id}</div>`,
      iconAnchor: [0, 10]
    });
    const m = L.marker([lat, lng], {icon, zIndexOffset:100}).addTo(map);
    m.on('click', () => selectSite(id));
    siteMarkers[id] = m;
  }

  // Slider interactions
  const track = document.getElementById('sliderTrack');
  track.addEventListener('click', e => {
    if (!frames.length) return;
    const rect = track.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    setFrame(Math.round(pct * (frames.length - 1)));
  });

  document.getElementById('btnPlay').addEventListener('click', togglePlay);
  document.getElementById('btnFirst').addEventListener('click', () => setFrame(0));
  document.getElementById('btnLast').addEventListener('click', () => setFrame(frames.length - 1));
};

// ── SELECT STATION ────────────────────────────────────────
function selectSite(id) {
  if (currentSite === id) return;
  stopPlay();
  currentSite = id;

  // Update pill styles
  document.querySelectorAll('.site-pill').forEach(p => p.classList.remove('selected'));
  const pill = document.getElementById(`pill-${id}`);
  if (pill) pill.classList.add('selected');

  document.getElementById('stSite').textContent = id;
  document.getElementById('liveTag').style.display = '';

  const [lat, lng] = STATIONS[id];
  map.setView([lat, lng], 8);

  buildFrames(id);
}

// ── BUILD 30-MIN FRAME LIST ───────────────────────────────
function buildFrames(id) {
  // Generate last 30 frames at 2-min intervals ending now
  const now = new Date();
  // round down to nearest 2 min
  now.setSeconds(0, 0);
  now.setMinutes(Math.floor(now.getMinutes() / 2) * 2);

  frames = [];
  for (let i = 29; i >= 0; i--) {
    const t = new Date(now.getTime() - i * 2 * 60000);
    frames.push({time: t, label: fmtTime(t)});
  }

  buildTicks();
  setFrame(frames.length - 1, true); // jump to live
}

function fmtTime(d) {
  return d.toLocaleString('en-US', {
    month:'short', day:'numeric',
    hour:'numeric', minute:'2-digit',
    hour12:true, timeZoneName:'short'
  });
}

// ── TICKS ────────────────────────────────────────────────
function buildTicks() {
  const track = document.getElementById('sliderTicks');
  track.innerHTML = '';
  frames.forEach((f, i) => {
    const pct = i / (frames.length - 1) * 100;
    const tick = document.createElement('div');
    tick.className = 'tick';
    tick.style.left = pct + '%';
    tick.id = `tick-${i}`;
    track.appendChild(tick);
  });
}

// ── SET FRAME ────────────────────────────────────────────
function setFrame(idx, force) {
  if (!frames.length) return;
  idx = Math.max(0, Math.min(frames.length - 1, idx));
  if (idx === frameIdx && !force) return;
  frameIdx = idx;

  const pct = idx / (frames.length - 1) * 100;
  document.getElementById('sliderFill').style.width = pct + '%';
  document.getElementById('sliderThumb').style.left = pct + '%';
  document.getElementById('frameTime').textContent = frames[idx].label;

  // Tick highlights
  document.querySelectorAll('.tick').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });

  const isLive = (idx === frames.length - 1);
  document.getElementById('liveTag').style.display = isLive ? '' : 'none';
  if (isLive) document.getElementById('stTime').textContent = '';

  loadWMS(idx);
}

// ── LOAD WMS ─────────────────────────────────────────────
function loadWMS(idx) {
  if (!currentSite) return;
  const site = currentSite.toLowerCase();
  const product = document.getElementById('product').value;

  if (wmsLayer) { map.removeLayer(wmsLayer); wmsLayer = null; }

  // NWS WMS always returns current data — TIME param not supported for most layers
  // but we keep frame metadata for the slider UX / future animation support
  wmsLayer = L.tileLayer.wms('https://opengeo.ncep.noaa.gov/geoserver/wms', {
    layers: `${site}:${site}_${product}`,
    format: 'image/png',
    transparent: true,
    version: '1.3.0',
    opacity: 0.9,
    zIndex: 10,
    _ts: frames[idx] ? frames[idx].time.getTime() : Date.now() // bust cache per frame
  }).addTo(map);

  wmsLayer.on('load', () => {
    document.getElementById('stTime').textContent =
      frameIdx === frames.length - 1 ? 'Live' : frames[frameIdx]?.label || '';
  });
}

// ── PRODUCT CHANGE ────────────────────────────────────────
function changeProduct() {
  if (currentSite) loadWMS(frameIdx);
}

// ── PLAY / PAUSE ──────────────────────────────────────────
function togglePlay() {
  playing ? stopPlay() : startPlay();
}

function startPlay() {
  playing = true;
  document.getElementById('btnPlay').textContent = '⏸';
  document.getElementById('btnPlay').classList.add('active');
  // if at end, restart from beginning
  if (frameIdx >= frames.length - 1) setFrame(0, true);
  playTimer = setInterval(() => {
    if (frameIdx >= frames.length - 1) { stopPlay(); return; }
    setFrame(frameIdx + 1);
  }, 800);
}

function stopPlay() {
  playing = false;
  clearInterval(playTimer);
  document.getElementById('btnPlay').textContent = '▶';
  document.getElementById('btnPlay').classList.remove('active');
}
</script>
</body>
</html>
