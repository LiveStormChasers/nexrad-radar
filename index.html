/* SLIDER */
#sliderBar{flex-shrink:0;background:#0e1218;border-top:1px solid #ffffff10;padding:6px 16px 8px;user-select:none}
#sliderRow{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.ctrl-btn{background:none;border:none;color:#5a7a9a;font-size:15px;cursor:pointer;padding:2px 8px;border-radius:6px;line-height:1;transition:color .15s}
.ctrl-btn:hover{color:#2df0ff}
.ctrl-btn.active{color:#2df0ff}
#sliderTrack{flex:1;height:28px;position:relative;cursor:pointer;display:flex;align-items:center}
#sliderRail{position:absolute;left:0;right:0;height:4px;background:#1e2d3d;border-radius:2px}
#sliderFill{position:absolute;left:0;height:4px;background:#2df0ff;border-radius:2px;pointer-events:none}
#sliderThumb{position:absolute;width:14px;height:14px;background:#fff;border:2px solid #2df0ff;border-radius:50%;transform:translateX(-50%);pointer-events:none;box-shadow:0 0 8px #2df0ff66;top:50%;margin-top:-7px}
#ticksRow{position:absolute;left:0;right:0;top:0;height:100%;pointer-events:none}
.tick{position:absolute;bottom:2px;width:2px;border-radius:1px;transform:translateX(-50%)}
#frameTime{font-size:11px;color:#7a9ab0;text-align:center}

/* STATION PILLS */
.site-pill{display:inline-flex;align-items:center;gap:4px;background:#0e1520cc;border:1.5px solid #2df0ff44;border-radius:20px;padding:2px 7px 2px 5px;font-size:10px;font-weight:700;color:#9bbbd0;cursor:pointer;white-space:nowrap;backdrop-filter:blur(4px);transition:all .12s;box-shadow:0 1px 4px #00000066}
.site-pill:hover{background:#1a2a3ccc;border-color:#2df0ffaa;color:#fff}
.site-pill.selected{background:#2df0ff22;border-color:#2df0ff;color:#fff;box-shadow:0 0 10px #2df0ff44}
.site-dot{width:6px;height:6px;border-radius:50%;background:#2df0ff88;flex-shrink:0;transition:all .12s}
.site-pill.selected .site-dot{background:#2df0ff;box-shadow:0 0 5px #2df0ffaa}
.leaflet-div-icon{background:transparent!important;border:none!important}
.leaflet-control-zoom a{background:#111418!important;color:#c8d4e0!important;border-color:#2a3a50!important}

  KOTX:[47.68,-117.63],KPAH:[37.07,-88.77],KPBZ:[40.53,-80.22],KPDT:[45.69,-118.85],

  KRIW:[43.07,-108.48],KRLX:[38.31,-81.72],KRTX:[45.71,-122.97],KSFX:[43.1,-112.69],
  KSGF:[37.23,-93.4],KSHV:[32.45,-93.84],KSJT:[31.37,-100.49],KSOX:[33.82,-117.64],

};

// ── STATE ─────────────────────────────────────────────────────────────────
let map, wmsLayer, currentSite = null;
let siteMarkers = {};
let frames = [], frameIdx = 0;
let playing = false, playTimer = null;
let dragging = false;

// ── MAP INIT ──────────────────────────────────────────────────────────────
window.onload = () => {
  map = L.map('map', {center:[38,-96], zoom:5});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    {subdomains:'abcd',maxZoom:19,attribution:'© CartoDB'}).addTo(map);

  for (const [id,[lat,lng]] of Object.entries(STATIONS)) {
    const icon = L.divIcon({
      className:'',
      html:`<div class="site-pill" id="pill-${id}"><div class="site-dot"></div>${id}</div>`,
      iconAnchor:[0,10]
    });
    const m = L.marker([lat,lng],{icon,zIndexOffset:100}).addTo(map);
    m.on('click', () => selectSite(id));
    siteMarkers[id] = m;
  }

  initSlider();
};

// ── STATION SELECT ────────────────────────────────────────────────────────
function selectSite(id) {
  stopPlay();
  currentSite = id;
  document.querySelectorAll('.site-pill').forEach(p => p.classList.remove('selected'));
  const pill = document.getElementById('pill-'+id);
  if (pill) pill.classList.add('selected');
  document.getElementById('stSite').textContent = id;
  document.getElementById('stSite').style.color = '#fff';
  const [lat,lng] = STATIONS[id];
  map.setView([lat,lng], 8);
  buildFrames();
}

// ── FRAMES (last 60 min, ~2 min intervals = 30 frames) ───────────────────
function buildFrames() {
  const now = new Date();
  now.setSeconds(0,0);
  now.setMinutes(Math.floor(now.getMinutes()/2)*2);
  frames = [];
  for (let i=29; i>=0; i--) {
    const t = new Date(now.getTime() - i*2*60000);
    frames.push({
      time: t,
      label: t.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true,timeZoneName:'short'})
    });
  }
  buildTicks();
  setFrame(frames.length-1, true);
}

// ── SLIDER ────────────────────────────────────────────────────────────────
function initSlider() {
  const track = document.getElementById('sliderTrack');

  track.addEventListener('mousedown', e => {
    dragging = true;
    scrubTo(e);
  });
  window.addEventListener('mousemove', e => { if (dragging) scrubTo(e); });
  window.addEventListener('mouseup', () => { dragging = false; });

  track.addEventListener('touchstart', e => { dragging=true; scrubTo(e.touches[0]); },{passive:true});
  window.addEventListener('touchmove', e => { if(dragging) scrubTo(e.touches[0]); },{passive:true});
  window.addEventListener('touchend', () => { dragging=false; });

  document.getElementById('btnPlay').addEventListener('click', togglePlay);
  document.getElementById('btnFirst').addEventListener('click', () => setFrame(0));
  document.getElementById('btnLast').addEventListener('click', () => setFrame(frames.length-1));
  document.getElementById('btnStep0').addEventListener('click', () => setFrame(frameIdx-1));
  document.getElementById('btnStep1').addEventListener('click', () => setFrame(frameIdx+1));
}

function scrubTo(e) {
  if (!frames.length) return;
  const track = document.getElementById('sliderTrack');
  const rect = track.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  setFrame(Math.round(pct * (frames.length-1)));
}

function buildTicks() {
  const row = document.getElementById('ticksRow');
  row.innerHTML = '';
  frames.forEach((f,i) => {
    const pct = i/(frames.length-1)*100;
    const tick = document.createElement('div');
    tick.className = 'tick';
    tick.style.cssText = `left:${pct}%;height:${i%5===0?10:6}px;background:${i===frameIdx?'#2df0ff':'#2a3f55'}`;
    tick.id = 'tick-'+i;
    row.appendChild(tick);
  });
}

function updateTicks() {
  frames.forEach((_,i) => {
    const t = document.getElementById('tick-'+i);
    if (t) t.style.background = i===frameIdx ? '#2df0ff' : '#2a3f55';
  });
}

function setFrame(idx, force) {
  if (!frames.length) return;
  idx = Math.max(0, Math.min(frames.length-1, idx));
  if (idx===frameIdx && !force) return;
  frameIdx = idx;

  const pct = idx/(frames.length-1)*100;
  document.getElementById('sliderFill').style.width = pct+'%';
  document.getElementById('sliderThumb').style.left = pct+'%';
  document.getElementById('frameTime').textContent = frames[idx].label;
  updateTicks();

  const isLive = idx===frames.length-1;
  document.getElementById('liveTag').style.display = isLive ? '' : 'none';

  loadWMS();
}

// ── WMS ───────────────────────────────────────────────────────────────────
function loadWMS() {
  if (!currentSite) return;
  const site = currentSite.toLowerCase();
  const product = document.getElementById('product').value;
  if (wmsLayer) { map.removeLayer(wmsLayer); wmsLayer=null; }
  wmsLayer = L.tileLayer.wms('https://opengeo.ncep.noaa.gov/geoserver/wms', {
    layers: `${site}:${site}_${product}`,
    format: 'image/png',
    transparent: true,
    version: '1.3.0',
    tileSize: 512,
    zoomOffset: -1,
    styles: 'radar_reflectivity',
    opacity: 0.9,
    zIndex: 10
  }).addTo(map);
}

function onProductChange() { if (currentSite) loadWMS(); }

// ── PLAY ──────────────────────────────────────────────────────────────────
function togglePlay() {
  playing ? stopPlay() : startPlay();
}
function startPlay() {
  playing = true;
  document.getElementById('btnPlay').textContent = '⏸';
  document.getElementById('btnPlay').classList.add('active');
  if (frameIdx >= frames.length-1) setFrame(0, true);
  playTimer = setInterval(() => {
    if (frameIdx >= frames.length-1) { stopPlay(); return; }
    setFrame(frameIdx+1);
  }, 700);
}
function stopPlay() {
  playing = false;
  clearInterval(playTimer);
  document.getElementById('btnPlay').textContent = '▶';
  document.getElementById('btnPlay').classList.remove('active');
}
</script>
