<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEXRAD Live Radar</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#070a0d;color:#e0e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{display:flex;align-items:center;gap:10px;padding:6px 14px;background:#0d1117ee;border-bottom:1px solid #ffffff0f;flex-shrink:0;backdrop-filter:blur(12px);z-index:1000}
.logo{font-size:14px;font-weight:800;color:#38d9f5;letter-spacing:.06em;white-space:nowrap}
select{background:#141d2b;border:1px solid #253040;color:#c8daea;font-size:11px;padding:4px 10px;border-radius:16px;cursor:pointer;outline:none}
#curSite{font-size:12px;font-weight:700;color:#4a6a80}
.spacer{flex:1}
#liveTag{font-size:9px;font-weight:800;color:#38d9f5;background:#38d9f518;border:1px solid #38d9f540;border-radius:8px;padding:2px 7px;display:none;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
#loadStatus{font-size:10px;color:#4a6a80}
#map{flex:1;position:relative;background:#070a0d}
#legend{position:fixed;bottom:60px;left:12px;z-index:800;background:#0d1117cc;border:1px solid #ffffff12;border-radius:10px;padding:7px 11px;backdrop-filter:blur(8px);pointer-events:none}
#legend-bar{width:200px;height:7px;border-radius:3px;margin-bottom:3px;background:linear-gradient(to right,rgb(54,78,130) 0%,rgb(57,85,134) 8%,rgb(76,125,156) 14%,rgb(60,173,110) 22%,rgb(21,125,30) 26%,rgb(203,222,1) 35%,rgb(252,253,0) 38%,rgb(250,148,0) 47%,rgb(249,35,11) 57%,rgb(202,153,180) 67%,rgb(154,36,224) 75%,rgb(132,253,255) 84%,rgb(161,101,73) 92%,rgb(115,10,1) 100%)}
#legend-labels{display:flex;justify-content:space-between;font-size:8px;color:#4a6a80;width:200px}
#sliderBar{flex-shrink:0;background:#111518;border-top:1px solid #ffffff08}
#sliderRow{display:flex;align-items:center;padding:0}
#playControls{display:flex;align-items:center;justify-content:center;gap:18px;padding:6px 0 8px;background:#111518}
.cb{background:none;border:none;color:#3a5a70;font-size:15px;cursor:pointer;padding:3px 6px;border-radius:5px;transition:color .15s;line-height:1}
.cb:hover,.cb.on{color:#38d9f5}
#bPlay{width:36px;height:36px;border-radius:50%;background:#38d9f5;color:#000;font-size:14px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;transition:background .15s;flex-shrink:0}
#bPlay:hover{background:#5ee8ff}
#stationCard{position:fixed;bottom:0;left:50%;transform:translateX(-50%);z-index:900;background:#1a2030ee;border:1px solid #ffffff14;border-bottom:none;border-radius:12px 12px 0 0;padding:7px 16px;display:none;backdrop-filter:blur(12px);white-space:nowrap}
#stationCard .sc-name{font-size:13px;font-weight:600;color:#e8f0f8}
#stationCard .sc-sub{font-size:11px;color:#4a6a80;margin-top:1px}
#track{flex:1;height:32px;position:relative;cursor:pointer;background:#0d1117}
#rail{position:absolute;inset:0;margin:auto;height:4px;background:#1a2535;border-radius:0}
#fill{position:absolute;left:0;top:50%;margin-top:-2px;height:4px;background:#38d9f5;border-radius:0;pointer-events:none;width:0}
#thumb{position:absolute;top:50%;width:3px;height:20px;background:#38d9f5;border-radius:1px;transform:translate(-50%,-50%);pointer-events:none;left:0}
#ticks{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center}
.tk{position:absolute;top:0;bottom:0;width:1px;background:#1e2e40;transform:translateX(-50%)}
.tk.on{background:#38d9f5}
.tk.loaded{background:#2a4060}
.site-pill{display:inline-flex;align-items:center;gap:3px;background:#0b1520cc;border:1.5px solid #38d9f533;border-radius:16px;padding:2px 6px 2px 4px;font-size:9px;font-weight:700;color:#7aaabb;cursor:pointer;backdrop-filter:blur(4px);transition:all .1s;box-shadow:0 1px 3px #00000055;white-space:nowrap}
.site-pill:hover{border-color:#38d9f5aa;color:#fff;background:#1a2a3ccc}
.site-pill.sel{border-color:#38d9f5;color:#fff;background:#38d9f518;box-shadow:0 0 8px #38d9f533}
.site-dot{width:5px;height:5px;border-radius:50%;background:#38d9f566;flex-shrink:0}
.site-pill.sel .site-dot{background:#38d9f5}
.mapboxgl-ctrl-group{background:#0d1117!important;border:1px solid #253040!important}
.mapboxgl-ctrl-group button{background:#0d1117!important;color:#8aaabb!important}
.mapboxgl-ctrl-group button:hover{background:#1a2535!important}
.mapboxgl-ctrl-attrib{background:#0d111799!important;color:#4a6a80!important;font-size:9px}
.mapboxgl-ctrl-attrib a{color:#4a8090!important}
</style>
</head>
<body>

<!-- Hidden canvas — radar pixels are written here, MapLibre uploads to GPU -->
<canvas id="radarCanvas" width="4096" height="4096" style="display:none"></canvas>

<div id="topbar">
  <div class="logo">⚡ NEXRAD</div>
  <select id="product"><option value="REF">Reflectivity</option></select>

</div>
<div id="stationCard">
    <div class="sc-name" id="scName">—</div>
    <div class="sc-sub" id="scSub">Reflectivity • 0.5°</div>
</div>

<div id="sliderBar">
  <div id="sliderRow">
    <div id="track"><div id="rail"></div><div id="fill"></div><div id="ticks"></div><div id="thumb"></div></div>
  </div>

    <button class="cb" id="b2" title="Step fwd">▶|</button>
    <button class="cb" id="b3" title="Latest">⏭</button>
  </div>
</div>

<script>
const STATIONS={KABR:[45.46,-98.41],KABX:[35.15,-106.82],KAKQ:[36.98,-77.01],KAMA:[35.23,-101.71],KAMX:[25.61,-80.41],KAPX:[44.91,-84.72],KARX:[43.82,-91.19],KATX:[48.19,-122.49],KBBX:[39.49,-121.63],KBGM:[42.2,-75.99],KBHX:[40.5,-124.29],KBIS:[46.77,-100.76],KBLX:[45.85,-108.61],KBMX:[33.17,-86.77],KBOX:[41.96,-71.14],KBRO:[25.92,-97.42],KBUF:[42.95,-78.74],KBYX:[24.6,-81.7],KCAE:[33.95,-81.12],KCBW:[46.04,-67.81],KCBX:[43.49,-116.23],KCCX:[40.92,-78.0],KCLE:[41.41,-81.86],KCLX:[32.66,-81.04],KCRP:[27.78,-97.51],KCXX:[44.51,-73.17],KCYS:[41.15,-104.81],KDAX:[38.5,-121.68],KDDC:[37.76,-99.97],KDFX:[29.27,-100.28],KDGX:[32.28,-89.98],KDIX:[39.95,-74.41],KDLH:[46.84,-92.21],KDMX:[41.73,-93.72],KDOX:[38.82,-75.44],KDTX:[42.7,-83.47],KDVN:[41.61,-90.58],KDYX:[32.54,-99.25],KEAX:[38.81,-94.26],KEMX:[31.89,-110.63],KENX:[42.59,-74.06],KEOX:[31.46,-85.46],KEPZ:[31.87,-106.7],KESX:[35.7,-114.89],KEVX:[30.56,-85.92],KEWX:[29.7,-98.03],KEYX:[35.1,-117.56],KFCX:[37.02,-80.27],KFDR:[34.36,-98.97],KFDX:[34.63,-103.63],KFFC:[33.36,-84.57],KFSD:[43.59,-96.73],KFSX:[34.57,-111.2],KFTG:[39.79,-104.55],KFWS:[32.57,-97.3],KGGW:[48.21,-106.63],KGJX:[39.06,-108.21],KGLD:[39.37,-101.7],KGRB:[44.5,-88.11],KGRK:[30.72,-97.38],KGRR:[42.89,-85.54],KGSP:[34.88,-82.22],KGWX:[33.9,-88.33],KGYX:[43.89,-70.26],KHDC:[30.54,-87.99],KHDX:[33.08,-106.12],KHGX:[29.47,-95.08],KHNX:[36.31,-119.63],KHPX:[36.74,-87.28],KHTX:[34.93,-86.08],KICT:[37.65,-97.44],KICX:[37.59,-112.86],KILN:[39.42,-83.82],KILX:[40.15,-89.34],KIND:[39.7,-86.28],KINX:[36.18,-95.56],KIWA:[33.29,-111.67],KIWX:[41.36,-85.7],KJAX:[30.48,-81.7],KJGX:[32.68,-83.35],KJKL:[37.59,-83.31],KLBB:[33.65,-101.81],KLCH:[30.12,-93.22],KLGX:[47.12,-124.11],KLNX:[41.96,-100.58],KLOT:[41.6,-88.08],KLRX:[40.74,-116.8],KLSX:[38.7,-90.68],KLTX:[33.99,-78.43],KLVX:[37.97,-85.94],KLWX:[38.98,-77.48],KLZK:[34.84,-92.26],KMAF:[31.94,-102.19],KMAX:[42.08,-122.72],KMBX:[48.39,-100.86],KMHX:[34.78,-76.88],KMKX:[42.97,-88.55],KMLB:[28.11,-80.65],KMOB:[30.68,-88.24],KMPX:[44.85,-93.56],KMQT:[46.53,-87.55],KMRX:[36.17,-83.4],KMSX:[47.04,-113.99],KMTX:[41.26,-112.45],KMUX:[37.15,-121.9],KMVX:[47.53,-97.33],KMXX:[32.54,-85.79],KNKX:[32.92,-117.04],KNQA:[35.35,-89.87],KOAX:[41.32,-96.37],KOHX:[36.25,-86.56],KOKX:[40.87,-72.86],KOTX:[47.68,-117.63],KPAH:[37.07,-88.77],KPBZ:[40.53,-80.22],KPDT:[45.69,-118.85],KPOE:[31.16,-92.98],KPUX:[38.46,-104.18],KRAX:[35.66,-78.49],KRGX:[39.75,-119.46],KRIW:[43.07,-108.48],KRLX:[38.31,-81.72],KRTX:[45.71,-122.97],KSFX:[43.1,-112.69],KSGF:[37.23,-93.4],KSHV:[32.45,-93.84],KSJT:[31.37,-100.49],KSOX:[33.82,-117.64],KSRX:[35.29,-94.36],KTBW:[27.71,-82.4],KTFX:[47.46,-111.38],KTLX:[35.33,-97.28],KTWX:[38.99,-96.23],KTYX:[43.76,-75.68],KUDX:[44.12,-102.83],KUEX:[40.32,-98.44],KVAX:[30.89,-83.0],KVBX:[34.84,-120.4],KVNX:[36.74,-98.13],KVTX:[34.41,-119.18],KVWX:[38.26,-87.72],KYUX:[32.5,-114.66]};

// ── State ─────────────────────────────────────────────────────────────────
let map, mapReady = false;
let curSite = null, curLat = 0, curLng = 0;
let frames = [], frameIdx = 0;
let playing = false, playTimer = null, dragging = false;
let worker = null, workerQ = [];

const RADAR_CANVAS = document.getElementById('radarCanvas');
const RADAR_CTX    = RADAR_CANVAS.getContext('2d');

// ── Map init ──────────────────────────────────────────────────────────────
window.onload = () => {
  mapboxgl.accessToken = 'pk.eyJ1IjoibGl2ZXN0b3JtY2hhc2VycyIsImEiOiJjbWsxY3RmcWIwMmNxM2NxNDNpZGJ6bWMwIn0.5GVRTGf4n9uBL_htx92oRQ';
  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [-96, 38],
    zoom: 5,
    attributionControl: { compact: true }
  });

  map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), 'top-left');

  map.on('load', () => {
    mapReady = true;

    // ── Apply OpenSnow's exact basemap style ──────────────────────────────
    // Sourced directly from OpenSnow's Mapbox style (cloudninewx/cmafpdc8400s701spbs3pfe6n)
    // Land: pure black. Water: hsl(213,23%,5%) very dark navy.
    // County lines: hsl(0,0%,52%) gray. State lines slightly brighter.
    // Roads: very dark, barely visible at low zoom.
    const style = map.getStyle();
    for (const layer of style.layers) {
      try {
        if (layer.type === 'background') {
          map.setPaintProperty(layer.id, 'background-color', 'hsl(0, 0%, 0%)');
        } else if (layer.type === 'fill' && layer.id.includes('water')) {
          map.setPaintProperty(layer.id, 'fill-color', 'hsl(213, 23%, 5%)');
        } else if (layer.type === 'line' && layer.id.includes('admin')) {
          // State/country boundaries — keep visible like OpenSnow
          map.setPaintProperty(layer.id, 'line-color', 'hsl(0, 0%, 52%)');
          map.setPaintProperty(layer.id, 'line-opacity', 0.7);
        } else if (layer.type === 'line' && (layer.id.includes('road') || layer.id.includes('bridge') || layer.id.includes('tunnel'))) {
          // Roads barely visible — OpenSnow shows them very faintly
          map.setPaintProperty(layer.id, 'line-opacity', 0.15);
        } else if (layer.type === 'fill' && (layer.id.includes('land') || layer.id.includes('landuse') || layer.id.includes('park') || layer.id.includes('national'))) {
          map.setPaintProperty(layer.id, 'fill-color', 'hsl(0, 0%, 0%)');
          map.setPaintProperty(layer.id, 'fill-opacity', 1);
        }
      } catch(e) { /* some layers may not support certain paint properties */ }
    }

    // Station markers
    for (const [id, [lat, lng]] of Object.entries(STATIONS)) {
      const wrap = document.createElement('div');
      wrap.innerHTML = `<div class="site-pill" id="pill-${id}"><div class="site-dot"></div>${id}</div>`;
      wrap.firstChild.addEventListener('click', () => selectSite(id));
      new mapboxgl.Marker({ element: wrap, anchor: 'left' }).setLngLat([lng, lat]).addTo(map);
    }
  });

  initSlider();
  spawnWorker();
};

// ── Worker ────────────────────────────────────────────────────────────────
function spawnWorker() {
  worker = new Worker('radarWorker.js');
  worker.onmessage = e => {
    const { id, rendered, error } = e.data;
    const job = workerQ.find(j => j.id === id);
    if (!job) return;
    workerQ = workerQ.filter(j => j.id !== id);
    if (error) job.reject(new Error(error));
    else       job.resolve(rendered);
  };
}

let workerIdCounter = 0;
function runWorker(msg) {
  return new Promise((resolve, reject) => {
    const id = ++workerIdCounter;
    workerQ.push({ id, resolve, reject });
    worker.postMessage({ id, ...msg });
  });
}

// ── Station select ────────────────────────────────────────────────────────
async function selectSite(id) {
  stopPlay();
  curSite = id;
  [curLat, curLng] = STATIONS[id];
  document.querySelectorAll('.site-pill').forEach(p => p.classList.remove('sel'));
  document.getElementById('pill-' + id)?.classList.add('sel');
  document.getElementById('curSite').textContent = id;
  document.getElementById('scName').textContent  = id;
  document.getElementById('stationCard').style.display = 'block';
  map.flyTo({ center: [curLng, curLat], zoom: 8, duration: 600 });

  frames = []; frameIdx = 0;
  clearRadar();
  setStatus('Loading frame list…');
  buildTicks(0);

  try {
    const r = await fetch(`/radar/list/${id}`);
    const keys = await r.json();
    if (!keys.length) { setStatus('No data'); return; }

    frames = keys.map(key => ({ key, label: keyToLabel(key), compactBuf: null, msgType: null, maxRangeKm: 460 }));
    buildTicks(frames.length);
    setFrame(frames.length - 1, true);
    setStatus('Loading latest…');

    await fetchAndProcess(frames.length - 1);
    updateTickLoaded(frames.length - 1);
    await redrawCurrentFrame();
    setStatus('');

    // Background load rest newest→oldest
    const remaining = [];
    for (let i = frames.length - 2; i >= 0; i--) remaining.push(i);
    (async () => {
      for (let i = 0; i < remaining.length; i += 3) {
        await Promise.allSettled(remaining.slice(i, i + 3).map(fi =>
          fetchAndProcess(fi).then(() => updateTickLoaded(fi)).catch(() => {})
        ));
      }
    })();
  } catch(e) {
    setStatus('Error: ' + e.message);
  }
}

async function gunzip(buf) {
  const ds = new DecompressionStream('gzip');
  const w  = ds.writable.getWriter();
  w.write(buf); w.close();
  const chunks = []; const r = ds.readable.getReader();
  while (true) { const {done,value} = await r.read(); if(done) break; chunks.push(value); }
  const total = chunks.reduce((a,c)=>a+c.length,0);
  const out = new Uint8Array(total); let off=0;
  for (const c of chunks){out.set(c,off);off+=c.length;}
  return out.buffer;
}

async function fetchAndProcess(fi) {
  const f = frames[fi];
  try {
    const r = await fetch(`/radar/process/${curSite}/${f.key}`);
    if (!r.ok) throw new Error(r.status);
    let buf = await r.arrayBuffer();
    // CF Pages strips Content-Encoding, so decompress manually if gzip
    if (new Uint8Array(buf,0,2)[0]===0x1f && new Uint8Array(buf,0,2)[1]===0x8b) buf = await gunzip(buf);
    f.compactBuf = buf;
    f.msgType    = 'compact';
    f.maxRangeKm = new DataView(f.compactBuf).getFloat32(20, true);
  } catch(e) {
    const r2 = await fetch(`/radar/file/${curSite}/${f.key}`);
    if (!r2.ok) throw new Error(r2.status);
    f.compactBuf = await r2.arrayBuffer();
    f.msgType    = 'level2';
    f.maxRangeKm = 460;
  }
}

function keyToLabel(key) {
  const m = key.match(/(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})/);
  if (!m) return key;
  const d = new Date(Date.UTC(+m[1],+m[2]-1,+m[3],+m[4],+m[5]));
  return d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true,timeZoneName:'short'});
}

// ── Radar rendering via MapLibre image source ─────────────────────────────
// Canvas source in MapLibre 4 renders transparent pixels as opaque black.
// Fix: render to canvas → toDataURL (synchronous) → image source.
// toDataURL avoids the async blob URL fetch race that causes the black square.

function radarCoords(maxRangeKm) {
  const r    = maxRangeKm || 460;
  const cosL = Math.cos(curLat * Math.PI / 180);
  const dLat = r / 111.111;
  const dLng = r / (111.111 * cosL);
  return [
    [curLng - dLng, curLat + dLat], // NW
    [curLng + dLng, curLat + dLat], // NE
    [curLng + dLng, curLat - dLat], // SE
    [curLng - dLng, curLat - dLat], // SW
  ];
}

async function redrawCurrentFrame() {
  const f = frames[frameIdx];
  if (!f || !f.compactBuf || !mapReady) return;

  const result = await runWorker({
    buffer:     f.compactBuf,
    type:       f.msgType === 'compact' ? 'compact' : 'level2',
    canvasSize: 4096
  });

  const imgData = new ImageData(new Uint8ClampedArray(result.pixels), 4096, 4096);
  RADAR_CTX.clearRect(0, 0, 4096, 4096);
  RADAR_CTX.putImageData(imgData, 0, 0);

  // toDataURL is synchronous — no async fetch race, preserves alpha correctly
  const url    = RADAR_CANVAS.toDataURL('image/png');
  const coords = radarCoords(f.maxRangeKm);

  if (map.getSource('radar')) {
    map.getSource('radar').updateImage({ url, coordinates: coords });
  } else {
    map.addSource('radar', { type: 'image', url, coordinates: coords });
    map.addLayer({
      id: 'radar-layer', type: 'raster', source: 'radar',
      paint: { 'raster-opacity': 1.0, 'raster-fade-duration': 0, 'raster-resampling': 'nearest' }
    });
  }
}

function clearRadar() {
  if (map.getLayer('radar-layer')) map.removeLayer('radar-layer');
  if (map.getSource('radar'))      map.removeSource('radar');
  RADAR_CTX.clearRect(0, 0, 4096, 4096);
}

// ── Slider ────────────────────────────────────────────────────────────────
function initSlider() {
  const track = document.getElementById('track');
  track.addEventListener('mousedown',  e => { dragging=true;  scrub(e); });
  window.addEventListener('mousemove', e => { if(dragging) scrub(e); });
  window.addEventListener('mouseup',   () => { dragging=false; });
  track.addEventListener('touchstart', e => { dragging=true;  scrub(e.touches[0]); }, {passive:true});
  window.addEventListener('touchmove', e => { if(dragging) scrub(e.touches[0]); }, {passive:true});
  window.addEventListener('touchend',  () => { dragging=false; });
  document.getElementById('b0').onclick    = () => setFrame(0);
  document.getElementById('b1').onclick    = () => setFrame(frameIdx - 1);
  document.getElementById('bPlay').onclick = togglePlay;
  document.getElementById('b2').onclick    = () => setFrame(frameIdx + 1);
  document.getElementById('b3').onclick    = () => setFrame(frames.length - 1);
}

function scrub(e) {
  if (!frames.length) return;
  const r   = document.getElementById('track').getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  setFrame(Math.round(pct * (frames.length - 1)));
}

function buildTicks(n) {
  const el = document.getElementById('ticks');
  el.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const pct = n === 1 ? 0 : i / (n-1) * 100;
    const tk  = document.createElement('div');
    tk.className = 'tk' + (i === frameIdx ? ' on' : '');
    tk.id = 'tk-' + i;
    tk.style.cssText = `left:${pct}%;height:${i%5===0?9:5}px`;
    el.appendChild(tk);
  }
}

function updateTickLoaded(i) {
  const t = document.getElementById('tk-' + i);
  if (t && !t.classList.contains('on')) t.classList.add('loaded');
}

function setFrame(idx, force) {
  if (!frames.length) return;
  idx = Math.max(0, Math.min(frames.length - 1, idx));
  if (idx === frameIdx && !force) return;
  frameIdx = idx;

  const pct = frames.length === 1 ? 0 : idx / (frames.length-1) * 100;
  document.getElementById('fill').style.width  = pct + '%';
  document.getElementById('thumb').style.left  = pct + '%';
  const lbl = frames[idx]?.label || '';
  document.getElementById('scSub').textContent = lbl ? `Reflectivity • 0.5° · ${lbl}` : 'Reflectivity • 0.5°';
  document.querySelectorAll('.tk').forEach((t, i) => {
    t.classList.toggle('on', i === idx);
    if (i === idx) t.classList.remove('loaded');
  });
  document.getElementById('liveTag').style.display = idx === frames.length-1 ? '' : 'none';

  redrawCurrentFrame();

  // On-demand load if not yet fetched
  if (!frames[idx]?.compactBuf) {
    setStatus('Loading…');
    fetchAndProcess(idx).then(() => {
      updateTickLoaded(idx);
      if (idx === frameIdx) { redrawCurrentFrame(); setStatus(''); }
    }).catch(() => setStatus(''));
  }
}

function togglePlay() { playing ? stopPlay() : startPlay(); }
function startPlay() {
  if (!frames.length) return;
  playing = true;
  document.getElementById('bPlay').innerHTML = '⏸';
  if (frameIdx >= frames.length - 1) setFrame(0, true);
  playTimer = setInterval(() => {
    if (frameIdx >= frames.length - 1) { stopPlay(); return; }
    setFrame(frameIdx + 1);
  }, 600);
}
function stopPlay() {
  playing = false;
  clearInterval(playTimer);
  document.getElementById('bPlay').innerHTML = '▶';
}

function setStatus(msg) { document.getElementById('loadStatus').textContent = msg; }
</script>
</body>
</html>
