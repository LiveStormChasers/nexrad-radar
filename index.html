<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXRAD Live Radar</title>
<link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="bzip2.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Barlow+Condensed:wght@400;600;700&display=swap');
:root{--bg:#0a0c0f;--panel:#111418;--border:#1e2329;--bb:#2d3540;--text:#c8d4e0;--dim:#5a6a7a;--accent:#00d4ff;--green:#39ff14;--warn:#ffcc00;--danger:#ff2d2d;--mono:'JetBrains Mono',monospace;--sans:'Barlow Condensed',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{display:flex;align-items:center;gap:10px;padding:6px 14px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.logo{font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:.1em;color:var(--accent);text-transform:uppercase;white-space:nowrap}
.cg{display:flex;align-items:center;gap:6px}
.cl{color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
select{background:var(--bg);border:1px solid var(--bb);color:var(--text);font-family:var(--mono);font-size:11px;padding:3px 6px;border-radius:3px;cursor:pointer;outline:none;appearance:none}
select:hover{border-color:var(--accent)}
input[type=range]{width:80px;accent-color:var(--accent)}
.btn{background:var(--bb);border:1px solid var(--bb);color:var(--text);font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:3px;cursor:pointer}
.btn:hover{background:var(--accent);color:#000}
.mode-btn{padding:4px 12px;font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.mode-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
#sb{display:flex;align-items:center;gap:16px;padding:4px 14px;background:#0d1015;border-bottom:1px solid var(--border);flex-shrink:0;font-size:11px;flex-wrap:wrap}
.si{display:flex;align-items:center;gap:5px;white-space:nowrap}
.sl{color:var(--dim);text-transform:uppercase;font-size:10px;letter-spacing:.06em}
.sv{color:var(--accent);font-weight:500}.sv.ok{color:var(--green)}.sv.warn{color:var(--warn)}.sv.err{color:var(--danger)}
#cdb{margin-left:auto;display:flex;align-items:center;gap:6px}
#cdt{width:80px;height:3px;background:var(--bb);border-radius:2px;overflow:hidden}
#cdf{height:100%;background:var(--accent);transition:width 1s linear}
#mw{position:relative;flex:1;overflow:hidden}
#map{width:100%;height:100%;background:#0d1015}
.leaflet-container{background:#0d1015!important}
.leaflet-control-attribution{background:rgba(10,12,15,.7)!important;color:var(--dim)!important;font-size:9px!important}
.leaflet-control-attribution a{color:var(--accent)!important}
.leaflet-bar a{background:var(--panel)!important;color:var(--text)!important;border-color:var(--bb)!important}
#loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,12,15,.85);z-index:1000;gap:14px;pointer-events:none}
#loading.hidden{display:none}
.spin{width:36px;height:36px;border:3px solid var(--bb);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#lmsg{font-family:var(--sans);font-size:14px;font-weight:600;color:var(--accent);letter-spacing:.08em;text-transform:uppercase}
#lsub{font-size:10px;color:var(--dim)}
#err{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(255,45,45,.12);border:1px solid var(--danger);color:var(--danger);padding:8px 16px;border-radius:4px;font-size:11px;z-index:2000;display:none;max-width:88vw;text-align:center}
#err.v{display:block}
#leg{position:absolute;bottom:28px;right:10px;background:rgba(10,12,15,.85);border:1px solid var(--border);padding:8px 10px;border-radius:4px;z-index:500;min-width:110px}
#lt{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.lr{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.ls{width:14px;height:10px;border-radius:2px;flex-shrink:0}
.ll{font-size:10px;color:var(--text)}
#source-badge{position:absolute;bottom:28px;left:10px;background:rgba(10,12,15,.85);border:1px solid var(--border);color:var(--dim);font-size:10px;padding:5px 8px;border-radius:4px;z-index:500}
</style>
</head>
<body>
<div id="topbar">
  <span class="logo">&#x2B21; LiveRadar</span>

  <!-- Mode toggle -->
  <div class="cg" style="gap:2px">
    <button class="btn mode-btn active" id="btn-comp" onclick="setMode('COMP')">&#x25A6; Composite</button>
    <button class="btn mode-btn" id="btn-site" onclick="setMode('SITE')">&#x25CE; Single Site</button>
  </div>

  <!-- Composite product -->
  <div class="cg" id="comp-controls">
    <span class="cl">Product</span>
    <select id="comp-prd">
      <option value="nexrad-n0q">NEXRAD N0Q Composite</option>
      <option value="q2-hsr">MRMS SeamlessHSR</option>
    </select>
  </div>

  <!-- Single site controls -->
  <div class="cg" id="site-controls" style="display:none">
    <span class="cl">Station</span>
    <select id="ss">
      <option value="KTLX">KTLX — OKC OK</option>
      <option value="KFWS">KFWS — DFW TX</option>
      <option value="KICT">KICT — Wichita KS</option>
      <option value="KINX">KINX — Tulsa OK</option>
      <option value="KSRX">KSRX — Ft Smith AR</option>
      <option value="KSHV">KSHV — Shreveport LA</option>
      <option value="KLZK">KLZK — Little Rock AR</option>
      <option value="KNQA">KNQA — Memphis TN</option>
      <option value="KGWX">KGWX — Columbus MS</option>
      <option value="KBMX">KBMX — Birmingham AL</option>
      <option value="KOHX">KOHX — Nashville TN</option>
      <option value="KHTX">KHTX — Huntsville AL</option>
      <option value="KEWX">KEWX — San Antonio TX</option>
      <option value="KHGX">KHGX — Houston TX</option>
      <option value="KLCH">KLCH — Lake Charles LA</option>
    </select>
    <span class="cl">Product</span>
    <select id="sp">
      <option value="REF">REF</option>
      <option value="VEL">VEL</option>
      <option value="ZDR">ZDR</option>
      <option value="CC">CC</option>
    </select>
    <span class="cl">Tilt</span>
    <select id="st">
      <option value="1">1 — 0.5°</option>
      <option value="2">2 — 0.9°</option>
      <option value="3">3 — 1.3°</option>
      <option value="4">4 — 1.8°</option>
    </select>
  </div>

  <div class="cg">
    <span class="cl">Opacity</span>
    <input type="range" id="osl" min="10" max="100" value="85" step="5">
    <span id="ov" style="color:var(--dim)">85%</span>
  </div>
  <button class="btn" id="br">&#x21BB; Refresh</button>
</div>

<div id="sb">
  <div class="si"><span class="sl">Source</span><span class="sv" id="i-src">—</span></div>
  <div class="si"><span class="sl">Time</span><span class="sv" id="i-tim">—</span></div>
  <div class="si"><span class="sl">Radials</span><span class="sv" id="i-rad" style="display:none">—</span></div>
  <div class="si"><span class="sl">Status</span><span class="sv" id="i-sts">Init…</span></div>
  <div id="cdb">
    <span class="sl">Refresh in</span><span class="sv" id="i-cd">—</span>
    <div id="cdt"><div id="cdf" style="width:100%"></div></div>
  </div>
</div>

<div id="mw">
  <div id="map"></div>
  <div id="loading"><div class="spin"></div><div id="lmsg">Loading…</div><div id="lsub"></div></div>
  <div id="err"></div>
  <div id="leg"><div id="lt">REF (dBZ)</div><div id="lb"></div></div>
  <div id="source-badge">MRMS via Iowa State MESONET</div>
</div>

<script>
'use strict';

// ── Helpers ──────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const iSrc=$('i-src'), iTim=$('i-tim'), iRad=$('i-rad'), iSts=$('i-sts');
const iCd=$('i-cd'), iCdf=$('cdf');

function showLoad(msg,sub=''){$('loading').classList.remove('hidden');$('lmsg').textContent=msg;$('lsub').textContent=sub;}
function hideLoad(){$('loading').classList.add('hidden');}
function showErr(msg){const e=$('err');e.textContent=msg;e.classList.add('v');setTimeout(()=>e.classList.remove('v'),8000);}
function setStatus(t,cls=''){iSts.className='sv'+(cls?' '+cls:'');iSts.textContent=t;}

// ── Map ───────────────────────────────────────────────────────────────
const map = L.map('map',{zoomControl:true,attributionControl:true}).setView([37,-95],5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; <a href="https://carto.com/">CARTO</a>',maxZoom:18,subdomains:'abcd'
}).addTo(map);

let radarLayer = null;
let curOp = 85;
let curMode = 'COMP';
let busy = false;
let cdTimer = null, cdSec = 0, cdTotal = 120;
let siteOverlay = null;

// ── Opacity slider ────────────────────────────────────────────────────
$('osl').addEventListener('input', e => {
  curOp = +e.target.value;
  $('ov').textContent = curOp + '%';
  if (radarLayer) {
    radarLayer.setOpacity(curOp/100);

  }
  if (siteOverlay) siteOverlay.setOpacity(curOp/100);
});

// ── Mode toggle ───────────────────────────────────────────────────────
function setMode(mode) {
  curMode = mode;
  $('btn-comp').classList.toggle('active', mode==='COMP');
  $('btn-site').classList.toggle('active', mode==='SITE');
  $('comp-controls').style.display = mode==='COMP' ? '' : 'none';
  $('site-controls').style.display = mode==='SITE' ? '' : 'none';
  $('i-rad').style.display = mode==='SITE' ? '' : 'none';
  $('source-badge').textContent = mode==='COMP'
    ? 'MRMS via Iowa State MESONET'
    : 'NEXRAD Level-2 via Unidata S3';
  clearOverlays();
  load();
}

function clearOverlays() {
  if (radarLayer) { map.removeLayer(radarLayer); radarLayer = null; }
  if (siteOverlay){ map.removeLayer(siteOverlay); siteOverlay = null; }
}

// ── Countdown ─────────────────────────────────────────────────────────
function startCd(secs) {
  clearInterval(cdTimer);
  cdTotal = secs; cdSec = secs;
  iCdf.style.width = '100%';
  iCd.textContent = secs+'s';
  cdTimer = setInterval(()=>{
    cdSec--;
    iCd.textContent = cdSec+'s';
    iCdf.style.width = (cdSec/cdTotal*100)+'%';
    if (cdSec <= 0) { clearInterval(cdTimer); load(); }
  }, 1000);
}

$('br').addEventListener('click', ()=>{ clearInterval(cdTimer); load(); });

// ── COMPOSITE MODE — Iowa State WMS GetMap (smooth, viewport-resolution) ──
// n0q: smooth WMS (rendered at viewport resolution, no tile seams)
// q2-hsr: tile fallback (no WMS available for this product)
const WMS_SMOOTH = new Set(['nexrad-n0q']);

function buildWmsUrl() {
  const b = map.getBounds();
  const sw = L.CRS.EPSG3857.project(b.getSouthWest());
  const ne = L.CRS.EPSG3857.project(b.getNorthEast());
  const bbox = `${sw.x},${sw.y},${ne.x},${ne.y}`;
  const sz = map.getSize();
  return `https://mesonet.agron.iastate.edu/cgi-bin/wms/nexrad/n0q.cgi?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&LAYERS=nexrad-n0q-900913&STYLES=&SRS=EPSG:3857&BBOX=${bbox}&WIDTH=${sz.x}&HEIGHT=${sz.y}&FORMAT=image/png&TRANSPARENT=true&ts=${Math.floor(Date.now()/60000)}`;
}

async function fetchWmsOverlay() {
  if (curMode !== 'COMP') return;
  const url = buildWmsUrl();

  const img = new Image();
  img.crossOrigin = 'anonymous';
  await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = url; });

  if (radarLayer) { map.removeLayer(radarLayer); radarLayer = null; }
  radarLayer = L.imageOverlay(img.src, map.getBounds(), {
    opacity: curOp/100,
    attribution: 'NEXRAD via <a href="https://mesonet.agron.iastate.edu">Iowa State MESONET</a>',
    zIndex: 200, interactive: false,
  }).addTo(map);

  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  iTim.textContent = `${now.getUTCFullYear()}-${pad(now.getUTCMonth()+1)}-${pad(now.getUTCDate())} ${pad(now.getUTCHours())}:${pad(now.getUTCMinutes())}Z`;
}

// Re-fetch when map moves/zooms (debounced 300ms)
let wmsDebounce = null;
function scheduleWmsRefresh() {
  if (curMode !== 'COMP') return;
  const product = $('comp-prd').value;
  clearTimeout(wmsDebounce);
  if (WMS_SMOOTH.has(product)) {
    wmsDebounce = setTimeout(fetchWmsOverlay, 300);
  }
}

async function loadComposite() {
  const product = $('comp-prd').value;
  const labels = { 'nexrad-n0q': 'NEXRAD N0Q (smooth)', 'q2-hsr': 'MRMS SeamlessHSR' };
  showLoad('Loading ' + (labels[product]||product) + '…', 'Iowa State MESONET');
  setStatus('Fetching…','warn');
  clearOverlays();
  iSrc.textContent = labels[product] || product;
  $('source-badge').textContent = 'Iowa State MESONET';

  if (!map._wmsListeners) {
    map.on('moveend zoomend', scheduleWmsRefresh);
    map._wmsListeners = true;
  }

  if (WMS_SMOOTH.has(product)) {
    // Smooth WMS path — renders at viewport resolution, re-fetches on pan/zoom
    try {
      await fetchWmsOverlay();
      hideLoad();
      setStatus('Composite Live','ok');
      updateLegend('REF');
      startCd(300);
    } catch(e) {
      hideLoad();
      setStatus('WMS error','err');
      console.error('WMS failed:', e);
    }
  } else {
    // Tile path for q2-hsr (no WMS available)
    const tileUrl = `https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/${product}/{z}/{x}/{y}.png?ts=${Math.floor(Date.now()/60000)}`;
    radarLayer = L.tileLayer(tileUrl, {
      opacity: curOp/100,
      attribution: 'MRMS via <a href="https://mesonet.agron.iastate.edu">Iowa State MESONET</a>',
      maxZoom: 10, tileSize: 256, zIndex: 200,
    }).addTo(map);
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    iTim.textContent = `${now.getUTCFullYear()}-${pad(now.getUTCMonth()+1)}-${pad(now.getUTCDate())} ${pad(now.getUTCHours())}:${pad(now.getUTCMinutes())}Z`;
    hideLoad();
    setStatus('Composite Live','ok');
    updateLegend('REF');
    startCd(300);
  }
}

// ── SINGLE SITE MODE — NEXRAD L2 binary parser ────────────────────────
const STA = {
  KTLX:{lat:35.3331,lon:-97.2775}, KFWS:{lat:32.5728,lon:-97.3030},
  KICT:{lat:37.6545,lon:-97.4430}, KINX:{lat:36.1750,lon:-95.5647},
  KSRX:{lat:35.2904,lon:-94.3619}, KSHV:{lat:32.4508,lon:-93.8412},
  KLZK:{lat:34.8365,lon:-92.2622}, KNQA:{lat:35.3447,lon:-89.8734},
  KGWX:{lat:33.8968,lon:-88.3293}, KBMX:{lat:33.1722,lon:-86.7700},
  KOHX:{lat:36.2472,lon:-86.5625}, KHTX:{lat:34.9306,lon:-86.0839},
  KEWX:{lat:29.7039,lon:-98.0286}, KHGX:{lat:29.4719,lon:-95.0792},
  KLCH:{lat:30.1253,lon:-93.2161},
};
const PRD_RANGE = {REF:460000, VEL:230000, ZDR:230000, CC:230000};

async function findLatestScan(sta) {
  const r = await fetch(`https://unidata-nexrad-level2-chunks.s3.amazonaws.com/?prefix=${sta}/&max-keys=500`);
  const xml = await r.text();
  const keys = [...xml.matchAll(/<Key>([^<]+)<\/Key>/g)].map(m=>m[1]);
  const scans = {};
  for (const k of keys) {
    const m = k.match(/\/(\d+)\//);
    if (m) { const n=parseInt(m[1]); if(!scans[n])scans[n]=[]; scans[n].push(k); }
  }
  const latest = Math.max(...Object.keys(scans).map(Number));
  return { scanNum: latest, chunks: scans[latest].sort() };
}

async function fetchChunks(chunks, limit) {
  const toFetch = chunks.slice(0, Math.min(limit, chunks.length));
  $('lsub').textContent = `0/${toFetch.length}`;
  const bufs = [];
  for (let i=0; i<toFetch.length; i++) {
    const buf = await fetch('https://unidata-nexrad-level2-chunks.s3.amazonaws.com/'+toFetch[i]).then(r=>r.arrayBuffer());
    bufs.push(buf);
    $('lsub').textContent = `${i+1}/${toFetch.length}`;
  }
  return bufs;
}

function parseAllChunks(bufs, tilt, product) {
  const elevs = new Map();
  let totalMsg31 = 0;

  for (const buf of bufs) {
    const raw = new Uint8Array(buf);
    const dv  = new DataView(buf);
    let pos = 0;
    // S-chunk: 24-byte AR2V file header
    if (raw[0]===0x41&&raw[1]===0x52&&raw[2]===0x32&&raw[3]===0x56) pos = 24;

    while (pos + 4 <= raw.byteLength) {
      const sz = Math.abs(dv.getInt32(pos, false));
      if (!sz || pos+4+sz > raw.byteLength) break;
      let block;
      try { block = window.Bzip2.decompress(raw.slice(pos+4, pos+4+sz)); }
      catch(e) { pos+=4+sz; continue; }
      pos += 4+sz;

      const bv = new DataView(block.buffer, block.byteOffset, block.byteLength);
      let r = 0;
      while (r+28 <= block.byteLength) {
        const sizeHW = bv.getUint16(r+12, false);
        const msgType = block[r+15];
        if (msgType === 31) {
          totalMsg31++;
          parseMsg31(block, bv, r+28, elevs);
          r += 12 + sizeHW*2;
        } else {
          r += 2432;
        }
        if (sizeHW===0 && msgType!==31) break;
      }
    }
  }

  if (!elevs.size) throw new Error(`No Message 31 records (saw ${totalMsg31} total)`);

  // Pick elevation
  const elevKeys = [...elevs.keys()].sort((a,b)=>a-b);
  const tKey = elevKeys[Math.min(tilt-1, elevKeys.length-1)];
  const elev = elevs.get(tKey);

  const mk = {REF:'ref',VEL:'vel',ZDR:'zdr',CC:'cc'}[product]||'ref';
  const data = (elev[mk]?.some(g=>g&&g.length>0)) ? elev[mk] : elev.ref;

  return {
    azimuth:    new Float32Array(elev.azimuth),
    data,
    gate_size:  elev.gs || 250,
    first_gate: elev.fg || 2125,
  };
}

function parseMsg31(data, view, base, elevs) {
  if (base+40 > data.byteLength) return;
  try {
    const az = view.getFloat32(base+12, false);
    const en = data[base+22];
    const nb = view.getUint16(base+30, false);
    if (az<0||az>=360||en<1||en>25||nb<1||nb>10) return;
    if (!elevs.has(en)) elevs.set(en,{azimuth:[],ref:[],vel:[],zdr:[],cc:[],fg:2125,gs:250});
    const el = elevs.get(en);
    el.azimuth.push(az);
    const mo = {ref:null,vel:null,zdr:null,cc:null};
    for (let i=0; i<Math.min(nb,9); i++) {
      const ptr = view.getUint32(base+32+i*4, false);
      if (!ptr) continue;
      const bb = base+ptr;
      if (bb+28>data.byteLength) continue;
      if (data[bb]!==0x44) continue;
      const name = String.fromCharCode(data[bb+1],data[bb+2],data[bb+3]).replace(/\0/g,'').trim();
      const ng  = view.getUint16(bb+8,  false);
      const fg  = view.getUint16(bb+10, false);
      const gs  = view.getUint16(bb+12, false);
      const ws  = data[bb+19];
      const sc  = view.getFloat32(bb+20, false);
      const off = view.getFloat32(bb+24, false);
      if (ng<1||ng>3600||(ws!==8&&ws!==16)||sc===0) continue;
      const ds = bb+28;
      if (ds+ng*(ws===16?2:1)>data.byteLength) continue;
      const dec = new Float32Array(ng);
      for (let g=0;g<ng;g++) {
        const rv = ws===16 ? view.getUint16(ds+g*2,false) : data[ds+g];
        dec[g] = rv<2 ? NaN : (rv-off)/sc;
      }
      if (name==='REF'){mo.ref=dec;el.fg=fg;el.gs=gs;}
      else if(name==='VEL') mo.vel=dec;
      else if(name==='ZDR') mo.zdr=dec;
      else if(name==='RHO'||name==='CC') mo.cc=dec;
    }
    for (const k of['ref','vel','zdr','cc']) el[k].push(mo[k]);
  } catch(e){}
}

// ── Canvas renderer ───────────────────────────────────────────────────
function renderToCanvas(azimuth, data, gateSize, firstGate, product, rangeM) {
  const SZ=1200, cx=SZ/2, cy=SZ/2, sc=SZ/(2*rangeM);
  const canvas=document.createElement('canvas'); canvas.width=SZ; canvas.height=SZ;
  const ctx=canvas.getContext('2d');
  const img=ctx.createImageData(SZ,SZ); const px=img.data;
  const nR=azimuth.length; if(!nR) return canvas;
  const bhw=(nR>500?.25:.5)*Math.PI/180;

  for (let r=0;r<nR;r++){
    const gates=data[r]; if(!gates||!gates.length) continue;
    const az=azimuth[r]*Math.PI/180;
    for (let g=0;g<gates.length;g++){
      const v=gates[g]; if(isNaN(v)||v==null) continue;
      const col=colorOf(v,product); if(!col) continue;
      const rN=(firstGate+g*gateSize)*sc, rF=(firstGate+(g+1)*gateSize)*sc;
      if(rN>SZ/2) break;
      const as=Math.max(2,Math.round(rN*bhw*2)), rs=Math.max(1,Math.round(rF-rN));
      for (let ai=0;ai<=as;ai++){
        const a=az-bhw+ai*(2*bhw/as), sa=Math.sin(a), ca=Math.cos(a);
        for (let ri=0;ri<=rs;ri++){
          const rng=rN+ri, x=Math.round(cx+sa*rng), y=Math.round(cy-ca*rng);
          if(x<0||x>=SZ||y<0||y>=SZ) continue;
          const i=(y*SZ+x)*4;
          px[i]=col[0]; px[i+1]=col[1]; px[i+2]=col[2]; px[i+3]=col[3];
        }
      }
    }
  }
  ctx.putImageData(img,0,0); return canvas;
}

// ── Colors — 5 dBZ threshold (no ground clutter) ─────────────────────
function colorOf(v,p){
  if(v==null||isNaN(v)) return null;
  if(p==='VEL') return vc(v);
  if(p==='ZDR') return zc(v);
  if(p==='CC')  return ccc(v);
  return rc(v);
}
function rc(d){
  if(d<5) return null;  // suppress clutter/noise
  if(d<10) return[0,236,236,200];
  if(d<20) return[1,159,244,210];
  if(d<30) return[3,0,244,220];
  if(d<40) return[2,253,2,225];
  if(d<45) return[1,197,1,230];
  if(d<50) return[255,255,0,235];
  if(d<55) return[231,192,0,240];
  if(d<60) return[255,144,0,245];
  if(d<65) return[255,0,0,250];
  if(d<70) return[214,0,0,255];
  return[255,0,255,255];
}
function vc(v){if(v<-27)return[255,0,255,240];if(v<-20)return[255,0,0,235];if(v<-10)return[255,170,0,225];if(v<-2)return[0,255,0,210];if(v<2)return null;if(v<10)return[0,170,255,210];if(v<20)return[0,0,255,225];if(v<27)return[170,0,255,235];return[255,0,255,240];}
function zc(z){if(z<0)return[102,0,204,220];if(z<.5)return[0,0,255,225];if(z<1)return[0,170,255,225];if(z<2)return[0,255,0,230];if(z<3)return[255,255,0,235];if(z<4)return[255,136,0,240];return[255,0,0,245];}
function ccc(c){if(c<.7)return[255,0,255,220];if(c<.8)return[255,0,0,225];if(c<.9)return[255,170,0,230];if(c<.95)return[255,255,0,235];if(c<.97)return[0,255,0,240];return[0,255,255,245];}

// ── Legend ────────────────────────────────────────────────────────────
const LEGS={
  REF:{t:'REF (dBZ)',e:[['#00ecec','5–10'],['#019ff4','10–20'],['#0300f4','20–30'],['#02fd02','30–40'],['#01c501','40–45'],['#ffff00','45–50'],['#ff9000','50–55'],['#ff0000','55–60'],['#d60000','60–65'],['#ff00ff','>65']]},
  VEL:{t:'VEL (m/s)',e:[['#ff00ff','<-27'],['#ff0000','-20↔-27'],['#ffaa00','-10↔-20'],['#00ff00','-2↔-10'],['#00aaff','+2↔+10'],['#0000ff','+10↔+20'],['#aa00ff','+20↔+27'],['#ff00ff','>+27']]},
  ZDR:{t:'ZDR (dB)',e:[['#6600cc','<0'],['#0000ff','0–0.5'],['#00aaff','0.5–1'],['#00ff00','1–2'],['#ffff00','2–3'],['#ff8800','3–4'],['#ff0000','>4']]},
  CC: {t:'CC (ρhv)',e:[['#ff00ff','<0.70'],['#ff0000','0.70–0.80'],['#ffaa00','0.80–0.90'],['#ffff00','0.90–0.95'],['#00ff00','0.95–0.97'],['#00ffff','>0.97']]},
};
function updateLegend(prd){
  const d=LEGS[prd]||LEGS.REF; $('lt').textContent=d.t;
  $('lb').innerHTML=d.e.map(([c,l])=>`<div class="lr"><div class="ls" style="background:${c}"></div><span class="ll">${l}</span></div>`).join('');
}

// ── Single site load ──────────────────────────────────────────────────
async function loadSingleSite() {
  const sta = $('ss').value;
  const prd = $('sp').value;
  const tlt = +$('st').value;
  iSrc.textContent = sta+' L2';

  showLoad('Scanning chunks…', sta);
  setStatus('Scanning…','warn');
  const {scanNum, chunks} = await findLatestScan(sta);

  const tm = chunks[0]?.match(/(\d{8})-(\d{6})/);
  if(tm){const[,d,t]=tm;iTim.textContent=`${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6)} ${t.slice(0,2)}:${t.slice(2,4)}Z`;}

  const limit = tlt===1 ? 25 : Math.min(15+tlt*10, 60);
  showLoad('Downloading chunks…', `0/${Math.min(limit,chunks.length)}`);
  setStatus('Downloading…','warn');
  const bufs = await fetchChunks(chunks, limit);

  showLoad('Parsing…', `${bufs.length} chunks`);
  setStatus('Parsing…','warn');
  await new Promise(r=>setTimeout(r,0));

  const {azimuth, data, gate_size, first_gate} = parseAllChunks(bufs, tlt, prd);
  iRad.textContent = azimuth.length;
  if (!azimuth.length) throw new Error('0 radials decoded');

  showLoad('Rendering…', azimuth.length+' radials');
  await new Promise(r=>setTimeout(r,0));

  const canvas = renderToCanvas(azimuth, data, gate_size, first_gate, prd, PRD_RANGE[prd]||460000);
  const s = STA[sta], rng = PRD_RANGE[prd]||460000;
  const ld=(rng/1000)/111.32, lnd=(rng/1000)/(111.32*Math.cos(s.lat*Math.PI/180));
  const bounds=[[s.lat-ld,s.lon-lnd],[s.lat+ld,s.lon+lnd]];

  clearOverlays();
  siteOverlay = L.imageOverlay(canvas.toDataURL('image/png'), bounds, {
    opacity: curOp/100, interactive:false, zIndex:200
  }).addTo(map);

  map.fitBounds(bounds, {padding:[20,20]});
  hideLoad(); setStatus('L2 Live','ok');
  updateLegend(prd);
  startCd(120);
}

// ── Main load dispatcher ──────────────────────────────────────────────
async function load() {
  if (busy) return;
  busy = true;
  clearInterval(cdTimer);
  $('err').classList.remove('v');
  try {
    if (curMode === 'COMP') await loadComposite();
    else await loadSingleSite();
  } catch(e) {
    console.error('[RADAR]', e);
    showErr(e.message || String(e));
    setStatus('Error','err');
    startCd(60);
  } finally {
    busy = false;
  }
}

// ── Init ──────────────────────────────────────────────────────────────
updateLegend('REF');
load();
</script>
