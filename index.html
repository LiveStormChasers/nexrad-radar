<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEXRAD Live Radar</title>
<link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0c0f;color:#c8d4e0;font-family:'JetBrains Mono',monospace,sans-serif;font-size:12px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#bar{display:flex;align-items:center;gap:10px;padding:6px 14px;background:#111418;border-bottom:1px solid #1e2329;flex-shrink:0;flex-wrap:wrap}
.logo{font-size:15px;font-weight:700;color:#00d4ff;letter-spacing:.1em;white-space:nowrap}
select,button{background:#0a0c0f;border:1px solid #2d3540;color:#c8d4e0;font-size:11px;padding:4px 8px;border-radius:3px;cursor:pointer;font-family:inherit}
select:hover,button:hover{border-color:#00d4ff}
label{color:#5a6a7a;font-size:10px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
#map{flex:1}
#status{padding:3px 12px;background:#111418;border-top:1px solid #1e2329;font-size:10px;color:#5a6a7a;flex-shrink:0;display:flex;gap:16px}
#status span{color:#c8d4e0}
.leaflet-control-zoom a{background:#111418!important;color:#c8d4e0!important;border-color:#2d3540!important}
.site-label{background:transparent;border:none;box-shadow:none;color:#00d4ff;font-size:10px;font-family:monospace;font-weight:700;white-space:nowrap;text-shadow:0 0 4px #000,0 0 4px #000}
</style>
</head>
<body>
<div id="bar">
  <div class="logo">⚡ NEXRAD</div>
  <label>Product</label>
  <select id="product" onchange="if(currentSite) loadSite(currentSite)">
    <option value="sr_bref">Reflectivity</option>
    <option value="sr_vel">Velocity</option>
  </select>
  <button onclick="if(currentSite) loadSite(currentSite)">⟳ Refresh</button>
  <div id="stSite" style="color:#00d4ff;font-weight:700;font-size:13px;margin-left:4px">← Click a station</div>
  <div id="stTime" style="color:#5a6a7a;font-size:10px"></div>
</div>
<div id="map"></div>
<div id="status">
  <div>Source <span>NWS OpenGeo WMS</span></div>
  <div id="stStatus">Status <span style="color:#39ff14">Ready</span></div>
  <div id="stNext">Next <span>—</span></div>
</div>

<script>
const STATIONS = {
  KABR:[45.46,-98.41],KABX:[35.15,-106.82],KAKQ:[36.98,-77.01],KAMA:[35.23,-101.71],
  KAMX:[25.61,-80.41],KAPX:[44.91,-84.72],KARX:[43.82,-91.19],KATX:[48.19,-122.49],

  KBUF:[42.95,-78.74],KBYX:[24.6,-81.7],KCAE:[33.95,-81.12],KCBW:[46.04,-67.81],
  KCBX:[43.49,-116.23],KCCX:[40.92,-78.0],KCLE:[41.41,-81.86],KCLX:[32.66,-81.04],

  KDLH:[46.84,-92.21],KDMX:[41.73,-93.72],KDOX:[38.82,-75.44],KDTX:[42.7,-83.47],

  KFDR:[34.36,-98.97],KFDX:[34.63,-103.63],KFFC:[33.36,-84.57],KFSD:[43.59,-96.73],
  KFSX:[34.57,-111.2],KFTG:[39.79,-104.55],KFWS:[32.57,-97.3],KGGW:[48.21,-106.63],
  KGJX:[39.06,-108.21],KGLD:[39.37,-101.7],KGRB:[44.5,-88.11],KGRK:[30.72,-97.38],

  KVWX:[38.26,-87.72],KYUX:[32.5,-114.66]
};

let map, wmsLayer, currentSite = null, cdTimer;
let siteMarkers = {};

window.onload = () => {
  map = L.map('map', {center:[37,-96], zoom:5});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    {subdomains:'abcd',maxZoom:19,attribution:'© CartoDB'}).addTo(map);

  // Add all station markers
  for (const [id, [lat, lng]] of Object.entries(STATIONS)) {
    const marker = L.circleMarker([lat, lng], {
      radius: 5,
      color: '#00d4ff',
      fillColor: '#003344',
      fillOpacity: 0.8,
      weight: 1.5,
      className: 'site-marker'
    }).addTo(map);

    const label = L.marker([lat, lng], {
      icon: L.divIcon({
        className: 'site-label',
        html: id,
        iconAnchor: [-7, 8]
      }),
      interactive: false
    }).addTo(map);

    marker.bindTooltip(id, {permanent: false, direction: 'top', className: 'site-label'});
    marker.on('click', () => loadSite(id));
    siteMarkers[id] = marker;
  }
};

function loadSite(id) {
  clearInterval(cdTimer);
  currentSite = id;

  // Highlight selected marker
  for (const [sid, m] of Object.entries(siteMarkers)) {
    m.setStyle({
      color: sid === id ? '#ffcc00' : '#00d4ff',
      fillColor: sid === id ? '#332200' : '#003344',
      radius: sid === id ? 7 : 5,
      weight: sid === id ? 2.5 : 1.5
    });
  }

  const site = id.toLowerCase();
  const product = document.getElementById('product').value;
  const layer = `${site}:${site}_${product}`;

  document.getElementById('stSite').textContent = id;
  document.getElementById('stStatus').innerHTML = 'Status <span style="color:#ffcc00">Loading…</span>';

  if (wmsLayer) { map.removeLayer(wmsLayer); wmsLayer = null; }

  wmsLayer = L.tileLayer.wms('https://opengeo.ncep.noaa.gov/geoserver/wms', {
    layers: layer,
    format: 'image/png',
    transparent: true,
    version: '1.3.0',
    opacity: 0.9,
    zIndex: 10
  }).addTo(map);

  wmsLayer.on('load', () => {
    document.getElementById('stStatus').innerHTML = 'Status <span style="color:#39ff14">OK</span>';
    document.getElementById('stTime').textContent = new Date().toUTCString().slice(5,22) + 'z';
    startCountdown(120);
  });

  wmsLayer.on('tileerror', () => {
    document.getElementById('stStatus').innerHTML = 'Status <span style="color:#ff2d2d">Error</span>';
  });

  // Center on station
  const coords = STATIONS[id];
  if (coords) map.setView(coords, 8);
}

function startCountdown(secs) {
  let t = secs;
  document.getElementById('stNext').innerHTML = `Next <span>${t}s</span>`;
  cdTimer = setInterval(() => {
    t--;
    document.getElementById('stNext').innerHTML = `Next <span>${t}s</span>`;
    if (t <= 0) { clearInterval(cdTimer); loadSite(currentSite); }
  }, 1000);
}
</script>
</body>
</html>
