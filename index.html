<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEXRAD Live Radar</title>
<link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0c0f;color:#c8d4e0;font-family:'JetBrains Mono',monospace,sans-serif;font-size:12px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#bar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:#111418;border-bottom:1px solid #1e2329;flex-shrink:0;flex-wrap:wrap}
.logo{font-size:15px;font-weight:700;color:#00d4ff;letter-spacing:.1em;white-space:nowrap}
select,button{background:#0a0c0f;border:1px solid #2d3540;color:#c8d4e0;font-size:11px;padding:4px 8px;border-radius:3px;cursor:pointer;font-family:inherit}
select:hover,button:hover{border-color:#00d4ff}
button.active{background:#00d4ff;color:#000;border-color:#00d4ff;font-weight:700}
label{color:#5a6a7a;font-size:10px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
#map{flex:1}
#status{padding:3px 12px;background:#111418;border-top:1px solid #1e2329;font-size:10px;color:#5a6a7a;flex-shrink:0;display:flex;gap:16px}
#status span{color:#c8d4e0}
.leaflet-control-zoom{display:none}
</style>
</head>
<body>
<div id="bar">
  <div class="logo">⚡ NEXRAD</div>
  <label>Station</label>
  <select id="site" onchange="loadSite()"></select>
  <label>Product</label>
  <select id="product" onchange="loadSite()">
    <option value="sr_bref">Reflectivity</option>
    <option value="sr_vel">Velocity</option>
  </select>
  <button onclick="loadSite()">⟳ Refresh</button>
  <div id="stTime" style="color:#00d4ff;font-size:10px;margin-left:8px"></div>
</div>
<div id="map"></div>
<div id="status">
  <div>Source <span>NWS OpenGeo WMS</span></div>
  <div id="stStatus">Status <span style="color:#39ff14">Ready</span></div>
  <div id="stNext">Next <span>—</span></div>
</div>

<script>
// All 143 NWS NEXRAD stations with sr_bref
const STATIONS = ["KABR","KABX","KAKQ","KAMA","KAMX","KAPX","KARX","KATX","KBBX","KBGM","KBHX","KBIS","KBLX","KBMX","KBOX","KBRO","KBUF","KBYX","KCAE","KCBW","KCBX","KCCX","KCLE","KCLX","KCRP","KCXX","KCYS","KDAX","KDDC","KDFX","KDGX","KDIX","KDLH","KDMX","KDOX","KDTX","KDVN","KDYX","KEAX","KEMX","KENX","KEOX","KEPZ","KESX","KEVX","KEWX","KEYX","KFCX","KFDR","KFDX","KFFC","KFSD","KFSX","KFTG","KFWS","KGGW","KGJX","KGLD","KGRB","KGRK","KGRR","KGSP","KGWX","KGYX","KHDC","KHDX","KHGX","KHNX","KHPX","KHTX","KICT","KICX","KILN","KILX","KIND","KINX","KIWA","KIWX","KJAX","KJGX","KJKL","KLBB","KLCH","KLGX","KLNX","KLOT","KLRX","KLSX","KLTX","KLVX","KLWX","KLZK","KMAF","KMAX","KMBX","KMHX","KMKX","KMLB","KMOB","KMPX","KMQT","KMRX","KMSX","KMTX","KMUX","KMVX","KMXX","KNKX","KNQA","KOAX","KOHX","KOKX","KOTX","KPAH","KPBZ","KPDT","KPOE","KPUX","KRAX","KRGX","KRIW","KRLX","KRTX","KSFX","KSGF","KSHV","KSJT","KSOX","KSRX","KTBW","KTFX","KTLX","KTWX","KTYX","KUDX","KUEX","KVAX","KVBX","KVNX","KVTX","KVWX","KYUX"];

// Station coordinates for map centering
const COORDS = {
  KMOB:[30.68,-88.24],KBMX:[33.17,-86.77],KHTX:[34.93,-86.08],KGWX:[33.9,-88.33],
  KNQA:[35.35,-89.87],KOHX:[36.25,-86.56],KLZK:[34.84,-92.26],KSHV:[32.45,-93.84],
  KFWS:[32.57,-97.3],KEWX:[29.7,-98.03],KHGX:[29.47,-95.08],KLCH:[30.12,-93.22],
  KCRP:[27.78,-97.51],KTLX:[35.33,-97.28],KINX:[36.18,-95.56],KICT:[37.65,-97.44],
  KSRX:[35.29,-94.36],KDGX:[32.28,-89.98],KTBW:[27.71,-82.4],KJAX:[30.48,-81.7],
  KMLB:[28.11,-80.65],KAMX:[25.61,-80.41],KBYX:[24.6,-81.7],KCLX:[32.66,-81.04],
  KLTX:[33.99,-78.43],KAKQ:[36.98,-77.01],KMHX:[34.78,-76.88],KGYX:[43.89,-70.26],
  KBOX:[41.96,-71.14],KDTX:[42.7,-83.47],KGRR:[42.89,-85.54],KILX:[40.15,-89.34],
  KDVN:[41.61,-90.58],KMPX:[44.85,-93.56],KDLH:[46.84,-92.21],KMKX:[42.97,-88.55],
  KGRB:[44.5,-88.11],KAPX:[44.91,-84.72],KOTX:[47.68,-117.63],KATX:[48.19,-122.49],
  KRTX:[45.71,-122.97],KPDT:[45.69,-118.85],KLGX:[47.12,-124.11],KSFX:[43.1,-112.69],
  KCBX:[43.49,-116.23],KMAX:[42.08,-122.72],KBBX:[39.49,-121.63],KBHX:[40.5,-124.29],
  KDAX:[38.5,-121.68],KMUX:[37.15,-121.9],KVBX:[34.84,-120.4],KSOX:[33.82,-117.64],
  KVTX:[34.41,-119.18],KEYX:[35.1,-117.56],KNKX:[32.92,-117.04],KEMX:[31.89,-110.63],
  KEPZ:[31.87,-106.7],KHDX:[33.08,-106.12],KDFX:[29.27,-100.28],KFDR:[34.36,-98.97],
  KINX:[36.18,-95.56],KSGF:[37.23,-93.4],KLSX:[38.7,-90.68],KIND:[39.7,-86.28],
  KIWX:[41.36,-85.7],KPBZ:[40.53,-80.22],KPAH:[37.07,-88.77],KFFC:[33.36,-84.57],
  KEOX:[31.46,-85.46],KVAX:[30.89,-83.0],KJGX:[32.68,-83.35],KGSP:[34.88,-82.22],
  KFCX:[37.02,-80.27],KRLX:[38.31,-81.72],KCKB:[39.3,-80.35]
};

let map, wmsLayer, cdTimer, cdVal;

window.onload = () => {
  map = L.map('map', {center:[33,-87], zoom:7, zoomControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    {subdomains:'abcd',maxZoom:19,attribution:'© CartoDB'}).addTo(map);

  const sel = document.getElementById('site');
  STATIONS.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    if (s === 'KMOB') o.selected = true;
    sel.appendChild(o);
  });

  loadSite();
};

function loadSite() {
  clearInterval(cdTimer);
  const site = document.getElementById('site').value.toLowerCase();
  const product = document.getElementById('product').value;
  const layer = `${site}:${site}_${product}`;

  document.getElementById('stStatus').innerHTML = 'Status <span style="color:#ffcc00">Loading…</span>';

  if (wmsLayer) { map.removeLayer(wmsLayer); wmsLayer = null; }

  wmsLayer = L.tileLayer.wms('https://opengeo.ncep.noaa.gov/geoserver/wms', {
    layers: layer,
    format: 'image/png',
    transparent: true,
    version: '1.3.0',
    opacity: 0.9,
    zIndex: 10
  }).addTo(map);

  wmsLayer.on('load', () => {
    document.getElementById('stStatus').innerHTML = 'Status <span style="color:#39ff14">OK</span>';
    document.getElementById('stTime').textContent = new Date().toUTCString().slice(5,22) + 'z';
    startCountdown(120);
  });

  wmsLayer.on('tileerror', () => {
    document.getElementById('stStatus').innerHTML = 'Status <span style="color:#ff2d2d">Error</span>';
  });

  // Center map on station
  const site_upper = document.getElementById('site').value;
  const coords = COORDS[site_upper];
  if (coords) map.setView(coords, 8);
}

function startCountdown(secs) {
  cdVal = secs;
  document.getElementById('stNext').innerHTML = `Next <span>${cdVal}s</span>`;
  cdTimer = setInterval(() => {
    cdVal--;
    document.getElementById('stNext').innerHTML = `Next <span>${cdVal}s</span>`;
    if (cdVal <= 0) { clearInterval(cdTimer); loadSite(); }
  }, 1000);
}
</script>
</body>
</html>
