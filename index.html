<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEXRAD Live Radar</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--brand:#3b9afa;--brand-hover:#5aadff;--gray4:#69747d;--gray5a:rgba(16,19,24,0.72);--panel-border:rgba(255,255,255,0.10)}
body{background:#000;color:#e0e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;height:100vh;overflow:hidden}

/* ── Topbar ── */
#topbar{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;gap:8px;padding:6px 14px;background:#0d1117ee;border-bottom:1px solid #ffffff0f;backdrop-filter:blur(12px)}
.logo{font-size:14px;font-weight:800;color:var(--brand);letter-spacing:.06em;white-space:nowrap}
#siteBtn{display:flex;align-items:center;gap:5px;background:#141d2b;border:1px solid #253040;color:#c8daea;font-size:11px;font-weight:700;padding:4px 10px 4px 8px;border-radius:16px;cursor:pointer;outline:none;white-space:nowrap;transition:border-color .15s,color .15s}
#siteBtn:hover{border-color:var(--brand);color:#fff}
#siteBtn svg{flex-shrink:0;color:var(--brand)}
#productToggle{display:flex;background:#0d1420;border:1px solid #253040;border-radius:16px;overflow:hidden;padding:2px}
.ptab{background:none;border:none;color:#4a6a80;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;cursor:pointer;transition:background .12s,color .12s;white-space:nowrap}
.ptab.active{background:var(--brand);color:#fff}
.ptab:not(.active):hover{color:#c8daea}
.spacer{flex:1}
#liveTag{font-size:9px;font-weight:800;color:var(--brand);background:#3b9afa18;border:1px solid #3b9afa40;border-radius:8px;padding:2px 7px;display:none;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
#loadStatus{font-size:10px;color:#4a6a80}

/* ── Map (full screen) ── */
#map{position:fixed;inset:0;background:#000}

/* ── Legend ── */
#legend{position:fixed;bottom:130px;left:12px;z-index:800;background:#0d1117cc;border:1px solid #ffffff12;border-radius:10px;padding:7px 11px;backdrop-filter:blur(8px);pointer-events:none}
#legend-bar{width:200px;height:7px;border-radius:3px;margin-bottom:3px;background:linear-gradient(to right,rgb(54,78,130) 0%,rgb(57,85,134) 8%,rgb(76,125,156) 14%,rgb(60,173,110) 22%,rgb(21,125,30) 26%,rgb(203,222,1) 35%,rgb(252,253,0) 38%,rgb(250,148,0) 47%,rgb(249,35,11) 57%,rgb(202,153,180) 67%,rgb(154,36,224) 75%,rgb(132,253,255) 84%,rgb(161,101,73) 92%,rgb(115,10,1) 100%)}
#legend-labels{display:flex;justify-content:space-between;font-size:8px;color:#4a6a80;width:200px}

/* ── Bottom wrap ── */
#bottomWrap{position:fixed;bottom:0;left:0;right:0;z-index:900;pointer-events:none}

/* ── Station card (above panel) ── */
#stationCard{
  display:none;
  align-items:center;
  justify-content:center;
  margin-bottom:8px;
  pointer-events:auto;
}
#scPill{
  display:flex;align-items:center;gap:8px;
  background:var(--gray5a);border:1px solid var(--panel-border);
  border-radius:9999px;padding:8px 16px 8px 12px;
  backdrop-filter:blur(8px);cursor:pointer;
  transition:background .15s;
}
#scPill:hover{background:rgba(30,35,44,0.85)}
.sc-icon{color:var(--brand);display:flex;align-items:center;flex-shrink:0}
.sc-texts{line-height:1.3}
.sc-name{font-size:13px;font-weight:600;color:#e8f0f8}
.sc-sub{font-size:11px;color:#8a9ab0}
.sc-chevron{color:#8a9ab0;display:flex;align-items:center;margin-left:4px;flex-shrink:0}

/* ── Panel (glass bar) ── */
#panel{
  width:100%;
  border-top:1px solid var(--panel-border);
  background:var(--gray5a);
  backdrop-filter:blur(8px);
  pointer-events:auto;
}

/* ── Segment timeline ── */
#segmentRow{
  display:flex;align-items:center;
  padding:24px 24px 16px;
  cursor:grab;
  user-select:none;
}
#segmentRow:active{cursor:grabbing}
.seg{
  flex:1;
  height:15px;
  margin-right:1px;
  border-radius:2px;
  background:var(--gray4);
  cursor:pointer;
  transition:background .1s;
  flex-shrink:0;
}
.seg:last-child{margin-right:0}
.seg.seg-past{background:#4a5560}
.seg.seg-active{background:var(--brand);min-width:10px}
.seg.seg-future{background:var(--gray4)}
.seg.seg-empty{background:#222;opacity:0.35;cursor:default;pointer-events:none}

/* ── Controls row ── */
#controlRow{
  display:flex;align-items:center;justify-content:center;
  padding:0 0 12px;
  gap:0;
}
.ctrl-btn{
  background:none;border:none;color:#8a9ab0;
  height:45px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;padding:0 12px;
  transition:color .15s, transform .1s;
}
.ctrl-btn:hover{color:#e0e8f0}
.ctrl-btn:active{transform:scale(0.9)}
#bPlay{
  width:45px;height:45px;border-radius:9999px;
  background:var(--brand);color:#fff;border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;margin:0 12px;
  transition:background .15s, transform .1s;
  flex-shrink:0;
}
#bPlay:hover{background:var(--brand-hover)}
#bPlay:active{transform:scale(0.9)}

/* ── Mapbox overrides ── */
.mapboxgl-marker{will-change:transform;backface-visibility:hidden}
.mapboxgl-marker{will-change:transform;backface-visibility:hidden}
.mapboxgl-ctrl-group{background:#0d1117!important;border:1px solid #253040!important}
.mapboxgl-ctrl-group button{background:#0d1117!important;color:#8aaabb!important}
.mapboxgl-ctrl-group button:hover{background:#1a2535!important}
.mapboxgl-ctrl-attrib{background:#0d111799!important;color:#4a6a80!important;font-size:9px}
.mapboxgl-ctrl-attrib a{color:#4a8090!important}
.mapboxgl-ctrl-bottom-right{bottom:140px!important}
.mapboxgl-ctrl-bottom-left{bottom:140px!important}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">⚡ NEXRAD</div>
  <button id="siteBtn" onclick="scrollToSite()">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="3" fill="currentColor"/><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2z" stroke="currentColor" stroke-width="2" fill="none" opacity=".4"/></svg>

  <div class="spacer"></div>
  <div id="loadStatus"></div>
  <div id="liveTag">● LIVE</div>
</div>

<div id="map"></div>

<!-- Bottom controls — matches OpenSnow layout exactly -->
<div id="bottomWrap">

          <path d="M13.8452 1.06197C14.8216 0.24455 16.3081 0.938743 16.3081 2.2121V15.7879C16.3081 17.0613 14.8216 17.7554 13.8452 16.938L5.73743 10.1501C5.02131 9.55059 5.02131 8.44941 5.73743 7.84986L13.8452 1.06197Z" fill="currentColor"/>
          <rect x="0.272705" y="0.818237" width="3.63636" height="16.3636" rx="1" fill="currentColor"/>
        </svg>
      </button>
    </div>

  </div><!-- #panel -->
</div><!-- #bottomWrap -->

<script>
const STATIONS={KABR:[45.46,-98.41],KABX:[35.15,-106.82],KAKQ:[36.98,-77.01],KAMA:[35.23,-101.71],KAMX:[25.61,-80.41],KAPX:[44.91,-84.72],KARX:[43.82,-91.19],KATX:[48.19,-122.49],KBBX:[39.49,-121.63],KBGM:[42.2,-75.99],KBHX:[40.5,-124.29],KBIS:[46.77,-100.76],KBLX:[45.85,-108.61],KBMX:[33.17,-86.77],KBOX:[41.96,-71.14],KBRO:[25.92,-97.42],KBUF:[42.95,-78.74],KBYX:[24.6,-81.7],KCAE:[33.95,-81.12],KCBW:[46.04,-67.81],KCBX:[43.49,-116.23],KCCX:[40.92,-78.0],KCLE:[41.41,-81.86],KCLX:[32.66,-81.04],KCRP:[27.78,-97.51],KCXX:[44.51,-73.17],KCYS:[41.15,-104.81],KDAX:[38.5,-121.68],KDDC:[37.76,-99.97],KDFX:[29.27,-100.28],KDGX:[32.28,-89.98],KDIX:[39.95,-74.41],KDLH:[46.84,-92.21],KDMX:[41.73,-93.72],KDOX:[38.82,-75.44],KDTX:[42.7,-83.47],KDVN:[41.61,-90.58],KDYX:[32.54,-99.25],KEAX:[38.81,-94.26],KEMX:[31.89,-110.63],KENX:[42.59,-74.06],KEOX:[31.46,-85.46],KEPZ:[31.87,-106.7],KESX:[35.7,-114.89],KEVX:[30.56,-85.92],KEWX:[29.7,-98.03],KEYX:[35.1,-117.56],KFCX:[37.02,-80.27],KFDR:[34.36,-98.97],KFDX:[34.63,-103.63],KFFC:[33.36,-84.57],KFSD:[43.59,-96.73],KFSX:[34.57,-111.2],KFTG:[39.79,-104.55],KFWS:[32.57,-97.3],KGGW:[48.21,-106.63],KGJX:[39.06,-108.21],KGLD:[39.37,-101.7],KGRB:[44.5,-88.11],KGRK:[30.72,-97.38],KGRR:[42.89,-85.54],KGSP:[34.88,-82.22],KGWX:[33.9,-88.33],KGYX:[43.89,-70.26],KHDC:[30.54,-87.99],KHDX:[33.08,-106.12],KHGX:[29.47,-95.08],KHNX:[36.31,-119.63],KHPX:[36.74,-87.28],KHTX:[34.93,-86.08],KICT:[37.65,-97.44],KICX:[37.59,-112.86],KILN:[39.42,-83.82],KILX:[40.15,-89.34],KIND:[39.7,-86.28],KINX:[36.18,-95.56],KIWA:[33.29,-111.67],KIWX:[41.36,-85.7],KJAX:[30.48,-81.7],KJGX:[32.68,-83.35],KJKL:[37.59,-83.31],KLBB:[33.65,-101.81],KLCH:[30.12,-93.22],KLGX:[47.12,-124.11],KLNX:[41.96,-100.58],KLOT:[41.6,-88.08],KLRX:[40.74,-116.8],KLSX:[38.7,-90.68],KLTX:[33.99,-78.43],KLVX:[37.97,-85.94],KLWX:[38.98,-77.48],KLZK:[34.84,-92.26],KMAF:[31.94,-102.19],KMAX:[42.08,-122.72],KMBX:[48.39,-100.86],KMHX:[34.78,-76.88],KMKX:[42.97,-88.55],KMLB:[28.11,-80.65],KMOB:[30.68,-88.24],KMPX:[44.85,-93.56],KMQT:[46.53,-87.55],KMRX:[36.17,-83.4],KMSX:[47.04,-113.99],KMTX:[41.26,-112.45],KMUX:[37.15,-121.9],KMVX:[47.53,-97.33],KMXX:[32.54,-85.79],KNKX:[32.92,-117.04],KNQA:[35.35,-89.87],KOAX:[41.32,-96.37],KOHX:[36.25,-86.56],KOKX:[40.87,-72.86],KOTX:[47.68,-117.63],KPAH:[37.07,-88.77],KPBZ:[40.53,-80.22],KPDT:[45.69,-118.85],KPOE:[31.16,-92.98],KPUX:[38.46,-104.18],KRAX:[35.66,-78.49],KRGX:[39.75,-119.46],KRIW:[43.07,-108.48],KRLX:[38.31,-81.72],KRTX:[45.71,-122.97],KSFX:[43.1,-112.69],KSGF:[37.23,-93.4],KSHV:[32.45,-93.84],KSJT:[31.37,-100.49],KSOX:[33.82,-117.64],KSRX:[35.29,-94.36],KTBW:[27.71,-82.4],KTFX:[47.46,-111.38],KTLX:[35.33,-97.28],KTWX:[38.99,-96.23],KTYX:[43.76,-75.68],KUDX:[44.12,-102.83],KUEX:[40.32,-98.44],KVAX:[30.89,-83.0],KVBX:[34.84,-120.4],KVNX:[36.74,-98.13],KVTX:[34.41,-119.18],KVWX:[38.26,-87.72],KYUX:[32.5,-114.66]};

// ── State ─────────────────────────────────────────────────────────────────
let map, mapReady = false, radarLayer = null;
let curSite = null, curLat = 0, curLng = 0;
let curProduct = 'REF';  // 'REF' or 'VEL'
let frames = [], frameIdx = 0;
let playing = false, playTimer = null, dragging = false;
let worker = null, workerQ = {}, workerMsgId = 0;

// Coords cache: keyed by `${site}-${msgType}` → {lngs, lats}
// Computed once per station (great-circle corner grid, ~50ms)
const coordsCache = {};
const coordsPending = {};  // key → true if a coords computation is in flight

// ── WebGL Custom Layer ─────────────────────────────────────────────────────
// Renders one quad per gate×ray cell at its exact great-circle lat/lon.
// Input: flat rgba image (nGates wide × nRays tall) + corner coord textures.
// Vertex shader uses gl_VertexID: no vertex buffers needed.
class RadarCustomLayer {
  constructor() {
    this.id            = 'radar-mesh';
    this.type          = 'custom';
    this.renderingMode = '2d';
    this.program  = null;
    this.vao      = null;
    this.lngTex   = null;
    this.latTex   = null;
    this.dataTex  = null;
    this.nGates   = 0;
    this.nRays    = 0;
    this.hasCoords = false;
    this.hasData   = false;
    this.map       = null;
  }

  onAdd(map, gl) {
    this.map = map;
    this.gl  = gl;  // ← store gl reference — critical for updateFrame()
    console.log('[RadarLayer] onAdd — WebGL', gl.getParameter(gl.VERSION));

    // ── Vertex shader ───────────────────────────────────────────────────
    // Uses gl_VertexID — no vertex buffers.
    // 6 vertices per cell (2 triangles), laid out in cellIdx * 6 + localIdx.
    // Corner textures: (nGates+1) wide × (nRays+1) tall, R32F float.
    // Data texture: nGates wide × nRays tall, RGBA8.
    const VS = `#version 300 es
precision highp float;

uniform mat4 u_matrix;   // Mercator→clip provided by Mapbox
uniform float u_nGates;
uniform float u_nRays;
uniform sampler2D u_lngTex;  // corner longitudes
uniform sampler2D u_latTex;  // corner latitudes

out vec2 v_tex;

void main() {
  int cellIdx  = gl_VertexID / 6;
  int localIdx = gl_VertexID - cellIdx * 6;

  // Two triangles: (0,1,2) and (0,2,3)
  // Corners: 0=ray,gate  1=ray,gate+1  2=ray+1,gate+1  3=ray+1,gate
  int ci;
  if      (localIdx == 1)              ci = 1;
  else if (localIdx == 2 || localIdx == 4) ci = 2;
  else if (localIdx == 5)              ci = 3;
  else                                 ci = 0;

  int nG = int(u_nGates);
  int rayIdx  = cellIdx / nG;
  int gateIdx = cellIdx - rayIdx * nG;

  int cRay  = rayIdx  + (ci >= 2 ? 1 : 0);
  int cGate = gateIdx + (ci == 1 || ci == 2 ? 1 : 0);

  // Sample corner lat/lon from float textures
  // Corner texture: width=(nGates+1), height=(nRays+1)
  float tcU = (float(cGate) + 0.5) / (u_nGates + 1.0);
  float tcV = (float(cRay)  + 0.5) / (u_nRays  + 1.0);
  float lng = texture(u_lngTex, vec2(tcU, tcV)).r;
  float lat = texture(u_latTex, vec2(tcU, tcV)).r;

  // lng/lat → Mapbox Mercator [0..1]
  // X: normalize longitude
  float mx = (lng + 180.0) / 360.0;
  // Y: Web Mercator (origin top-left, matching Mapbox convention)
  float sinLat = sin(lat * 0.01745329252);
  float my = 0.5 - log((1.0 + sinLat) / (1.0 - sinLat)) * 0.07957747155;

  gl_Position = u_matrix * vec4(mx, my, 0.0, 1.0);

  // UV into data texture: center of this cell
  v_tex = vec2((float(gateIdx) + 0.5) / u_nGates,
               (float(rayIdx)  + 0.5) / u_nRays);
}`;

    // ── Fragment shader ──────────────────────────────────────────────────
    const FS = `#version 300 es
precision mediump float;
uniform sampler2D u_data;
in vec2 v_tex;
out vec4 fragColor;
void main() {
  vec4 c = texture(u_data, v_tex);
  if (c.a < 0.5) discard;
  fragColor = c;
}`;

    const prog = gl.createProgram();
    for (const [src, type] of [[VS, gl.VERTEX_SHADER], [FS, gl.FRAGMENT_SHADER]]) {
      const sh = gl.createShader(type);
      gl.shaderSource(sh, src);
      gl.compileShader(sh);
      if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS))
        console.error('Shader error:', gl.getShaderInfoLog(sh));
      gl.attachShader(prog, sh);
    }
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS))
      console.error('Link error:', gl.getProgramInfoLog(prog));

    this.program = prog;
    this.uMatrix = gl.getUniformLocation(prog, 'u_matrix');
    this.uNGates = gl.getUniformLocation(prog, 'u_nGates');
    this.uNRays  = gl.getUniformLocation(prog, 'u_nRays');
    this.uLngTex = gl.getUniformLocation(prog, 'u_lngTex');
    this.uLatTex = gl.getUniformLocation(prog, 'u_latTex');
    this.uData   = gl.getUniformLocation(prog, 'u_data');

    // Empty VAO — required for gl_VertexID without vertex buffers in WebGL2
    this.vao = gl.createVertexArray();

    // Allocate textures (filled by updateFrame)
    this.lngTex  = this._mkFloatTex(gl);
    this.latTex  = this._mkFloatTex(gl);
    this.dataTex = this._mkRGBATex(gl);
  }

  _mkFloatTex(gl) {
    const t = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, t);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S,       gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T,       gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER,   gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER,   gl.NEAREST);
    return t;
  }

  _mkRGBATex(gl) {
    const t = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, t);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S,       gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T,       gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER,   gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER,   gl.NEAREST);
    return t;
  }

  // Call with lngs/lats on first frame (or station change), null on subsequent frames.
  updateFrame(rgba, lngs, lats, nGates, nRays) {
    const gl = this.gl;
    if (!gl) { console.error('[RadarLayer] updateFrame called before onAdd'); return; }
    this.nGates = nGates;
    this.nRays  = nRays;

    if (lngs && lats) {
      // Upload corner coordinate textures (one-time per station)
      const cW = nGates + 1, cH = nRays + 1;
      gl.bindTexture(gl.TEXTURE_2D, this.lngTex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.R32F, cW, cH, 0, gl.RED, gl.FLOAT, lngs);
      gl.bindTexture(gl.TEXTURE_2D, this.latTex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.R32F, cW, cH, 0, gl.RED, gl.FLOAT, lats);
      this.hasCoords = true;
    }

    if (!this.hasCoords) return; // can't render without coords

    // Upload data (color) texture — per frame
    gl.bindTexture(gl.TEXTURE_2D, this.dataTex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, nGates, nRays, 0, gl.RGBA, gl.UNSIGNED_BYTE, rgba);

    this.hasData = true;
    console.log(`[RadarLayer] frame uploaded: ${nGates}g × ${nRays}r, hasCoords=${this.hasCoords}`);
    this.map.triggerRepaint();
  }

  _getGL() {
    // Fallback: get gl from Mapbox canvas
    if (this.map) {
      const canvas = this.map.getCanvas();
      return canvas.getContext('webgl2') || canvas.getContext('webgl');
    }
    return null;
  }

  clear() {
    this.hasData   = false;
    this.hasCoords = false;
    if (this.map) this.map.triggerRepaint();
  }

  render(gl, args) {
    if (!this.hasData || !this.hasCoords || !this.program) return;

    // Support both Mapbox v2 (matrix as Float32Array) and v3 (options object)
    let matrix;
    if (args instanceof Float32Array) {
      matrix = args;
    } else if (args && args.defaultProjectionData) {
      matrix = args.defaultProjectionData.mainMatrix;
    } else if (args && args.mainMatrix) {
      matrix = args.mainMatrix;
    } else {
      matrix = args; // last resort
    }
    if (!matrix) { console.error('[RadarLayer] no matrix in render args:', args); return; }

    // Cache gl reference for updateFrame calls before onAdd gl is stored
    this.gl = gl;

    gl.useProgram(this.program);
    gl.bindVertexArray(this.vao);

    gl.uniformMatrix4fv(this.uMatrix, false, matrix);
    gl.uniform1f(this.uNGates, this.nGates);
    gl.uniform1f(this.uNRays,  this.nRays);

    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, this.lngTex);
    gl.uniform1i(this.uLngTex, 0);

    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, this.latTex);
    gl.uniform1i(this.uLatTex, 1);

    gl.activeTexture(gl.TEXTURE2);
    gl.bindTexture(gl.TEXTURE_2D, this.dataTex);
    gl.uniform1i(this.uData, 2);

    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
    gl.disable(gl.DEPTH_TEST);

    // 6 vertices per cell (2 triangles), no vertex buffer — gl_VertexID only
    const count = this.nRays * this.nGates * 6;
    gl.drawArrays(gl.TRIANGLES, 0, count);
    const err = gl.getError();
    if (err) console.error('[RadarLayer] GL error after draw:', err);
    gl.bindVertexArray(null);
  }
}

// ── Worker bridge ─────────────────────────────────────────────────────────
function initWorker() {
  worker = new Worker('radarWorker.js');
  worker.onmessage = e => {
    const { id, rendered, coords, error } = e.data;
    const p = workerQ[id];
    if (!p) return;
    delete workerQ[id];
    if (error) p.rej(new Error(error));
    else        p.res(rendered || { coords });
  };
}

function runWorker(msg) {
  return new Promise((res, rej) => {
    const id = workerMsgId++;
    workerQ[id] = { res, rej };
    worker.postMessage({ id, ...msg });
  });
}

// ── Decompression helper (gzip) ───────────────────────────────────────────
async function gunzip(buf) {
  const ds = new DecompressionStream('gzip');
  const writer = ds.writable.getWriter();
  writer.write(buf);
  writer.close();
  const chunks = [];
  const reader = ds.readable.getReader();
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  const total = chunks.reduce((s, c) => s + c.byteLength, 0);
  const out   = new Uint8Array(total);
  let off = 0;
  for (const c of chunks) { out.set(c, off); off += c.byteLength; }
  return out.buffer;
}

// ── Station GL sprite pills ────────────────────────────────────────────────
// Draws each station label as a canvas pill, adds it to the map image atlas,
// then renders all stations as a single symbol layer inside the WebGL pipeline.
// This is the only approach that gives zero-lag geo-locking during pan/zoom.

let selStationId = null;

function makePillCanvas(id, selected) {
  const dpr    = window.devicePixelRatio || 1;
  const font   = `bold ${10 * dpr}px "DIN Pro","Arial Narrow",Arial,sans-serif`;
  // Measure text
  const tmp = document.createElement('canvas').getContext('2d');
  tmp.font = font;
  const tw = tmp.measureText(id).width;
  const dotR  = 3 * dpr;
  const pad   = 6 * dpr;
  const gap   = 4 * dpr;
  const h     = 18 * dpr;
  const w     = Math.ceil(pad + dotR * 2 + gap + tw + pad);
  const r     = h / 2;  // pill radius

  const c   = document.createElement('canvas');
  c.width   = w;
  c.height  = h;
  const ctx = c.getContext('2d');

  // Pill background
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(w - r, 0);
  ctx.arcTo(w, 0, w, r, r);
  ctx.lineTo(w, h - r);
  ctx.arcTo(w, h, w - r, h, r);
  ctx.lineTo(r, h);
  ctx.arcTo(0, h, 0, h - r, r);
  ctx.lineTo(0, r);
  ctx.arcTo(0, 0, r, 0, r);
  ctx.closePath();
  ctx.fillStyle   = selected ? 'rgba(59,154,250,0.20)' : 'rgba(11,21,32,0.82)';
  ctx.fill();
  // Border
  ctx.strokeStyle = selected ? '#3b9afa' : 'rgba(59,154,250,0.28)';
  ctx.lineWidth   = selected ? 1.5 * dpr : 1 * dpr;
  ctx.stroke();

  // Dot
  const dotX = pad + dotR;
  const dotY = h / 2;
  ctx.beginPath();
  ctx.arc(dotX, dotY, dotR, 0, Math.PI * 2);
  ctx.fillStyle = selected ? '#3b9afa' : 'rgba(59,154,250,0.45)';
  ctx.fill();

  // Text
  ctx.font         = font;
  ctx.fillStyle    = selected ? '#ffffff' : '#7aaabb';
  ctx.textBaseline = 'middle';
  ctx.fillText(id, dotX + dotR + gap, dotY);

  return { canvas: c, w, h };
}

function addStationMarkers() {
  const features = [];

  for (const [id, [lat, lng]] of Object.entries(STATIONS)) {
    // Add normal + selected images to atlas
    const { canvas: cn, w, h } = makePillCanvas(id, false);
    const { canvas: cs }       = makePillCanvas(id, true);
    map.addImage(`pill-${id}`,     { width: w, height: h, data: cn.getContext('2d').getImageData(0, 0, w, h).data });
    map.addImage(`pill-${id}-sel`, { width: w, height: h, data: cs.getContext('2d').getImageData(0, 0, w, h).data });

    features.push({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [lng, lat] },
      properties: { id, lat, lng, sel: false }
    });
  }

  map.addSource('stations', {
    type: 'geojson',
    data: { type: 'FeatureCollection', features }
  });

  map.addLayer({
    id:     'stations-pills',
    type:   'symbol',
    source: 'stations',
    layout: {
      'icon-image':           ['case', ['get', 'sel'], ['concat', 'pill-', ['get', 'id'], '-sel'], ['concat', 'pill-', ['get', 'id']]],
      'icon-allow-overlap':   true,
      'icon-ignore-placement':true,
      'icon-anchor':          'center',
    },
    paint: {
      'icon-opacity': 1
    }
  });

  // Click handler
  map.on('click', 'stations-pills', e => {
    const p = e.features[0].properties;
    selectStation(p.id, p.lat, p.lng);
  });
  map.on('mouseenter', 'stations-pills', () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', 'stations-pills', () => { map.getCanvas().style.cursor = ''; });
}

function setStationSelected(id) {
  // Rebuild GeoJSON with updated sel flag — cheapest way to trigger icon-image update
  const features = Object.entries(STATIONS).map(([sid, [lat, lng]]) => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: [lng, lat] },
    properties: { id: sid, lat, lng, sel: sid === id }
  }));
  map.getSource('stations').setData({ type: 'FeatureCollection', features });
}

// ── Station selection ─────────────────────────────────────────────────────
async function selectStation(id, lat, lng) {
  selStationId = id;
  setStationSelected(id);
  curSite = id; curLat = lat; curLng = lng;
  document.getElementById('scName').textContent = id;
  document.getElementById('siteBtnLabel').textContent = id;
  document.getElementById('stationCard').style.display = 'flex';
  stopPlay();

  // Invalidate coords cache for this station (format params may differ)
  for (const k of Object.keys(coordsCache)) {
    if (k.startsWith(id + '-')) delete coordsCache[k];
  }
  for (const k of Object.keys(coordsPending)) {
    if (k.startsWith(id + '-')) delete coordsPending[k];
  }

  if (radarLayer) radarLayer.clear();

  map.flyTo({ center: [lng, lat], zoom: 7, duration: 800 });

  loadStation(); // intentionally not awaited — loads in background while map flies
}

let loadGen = 0;
let liveRefreshTimer = null;

async function loadStation() {
  const gen = ++loadGen;
  clearTimeout(liveRefreshTimer);
  setStatus('Loading…');
  frames = []; frameIdx = 0;
  buildTicks(0);
  document.getElementById('liveTag').style.display = 'none';
  if (radarLayer) radarLayer.clear();

  try {
    const r   = await fetch(`/radar/list/${curSite}`);
    const lst = await r.json();
    if (gen !== loadGen) return;
    if (!lst.length) { setStatus('No data'); return; }

    frames = lst.map(k => ({ key: k, label: keyToLabel(k), compactBuf: null, msgType: 'compact', failed: false }));
    buildTicks(frames.length);
    setStatus('');

    // Step 1: Load the last few frames first (newest), show as soon as one succeeds
    const recentIdx = frames.length - 1;
    let shown = false;
    for (let i = recentIdx; i >= Math.max(0, recentIdx - 4); i--) {
      if (gen !== loadGen) return;
      try {
        await fetchAndProcess(i);
        if (frames[i].compactBuf) {
          updateTickLoaded(i);
          frameIdx = i;
          setFrame(i, true);
          setStatus('');
          document.getElementById('liveTag').style.display = '';
          shown = true;
          break;
        } else {
          frames[i].failed = true;
          updateTickEmpty(i);
        }
      } catch(e) {
        frames[i].failed = true;
        updateTickEmpty(i);
      }
    }

    if (!shown) { setStatus('No data'); return; }
    if (gen !== loadGen) return;

    // Step 2: Load remaining frames in background (all in parallel)
    const remaining = frames.map((f, i) => i).filter(i => !frames[i].compactBuf && !frames[i].failed);
    Promise.all(remaining.map(async i => {
      if (gen !== loadGen) return;
      try {
        await fetchAndProcess(i);
        if (gen !== loadGen) return;
        if (frames[i].compactBuf) updateTickLoaded(i);
        else { frames[i].failed = true; updateTickEmpty(i); }
      } catch(e) {
        frames[i].failed = true;
        updateTickEmpty(i);
      }
    })).then(() => {
      if (gen !== loadGen) return;
      // After all done, jump to absolute latest loaded frame
      const latestLoaded = frames.reduce((best, f, i) => f.compactBuf ? i : best, -1);
      if (latestLoaded > frameIdx) setFrame(latestLoaded, true);
    });

    liveRefreshTimer = setTimeout(() => liveRefresh(gen), 60000);
  } catch(e) {
    if (gen !== loadGen) return;
    console.error(e);
    setStatus('Error loading');
  }
}

async function liveRefresh(gen) {
  if (gen !== loadGen) return;
  try {
    const r   = await fetch(`/radar/list/${curSite}`);
    const lst = await r.json();
    if (gen !== loadGen) return;
    // Find any filenames not already in frames
    const existing = new Set(frames.map(f => f.key));
    const newKeys  = lst.filter(k => !existing.has(k));
    if (newKeys.length) {
      // Append new frames and load them
      for (const k of newKeys) {
        frames.push({ key: k, label: keyToLabel(k), compactBuf: null, msgType: 'compact' });
      }
      // Trim to last 24
      if (frames.length > 24) frames.splice(0, frames.length - 24);
      buildTicks(frames.length);
      // Restore active seg classes for loaded frames
      frames.forEach((f, i) => { if (f.compactBuf) updateTickLoaded(i); });
      // Load new frames
      await Promise.all(
        frames.slice(-newKeys.length).map(async (_, i) => {
          const fi = frames.length - newKeys.length + i;
          await fetchAndProcess(fi);
          if (gen !== loadGen) return;
          if (frames[fi].compactBuf) updateTickLoaded(fi);
        })
      );
      if (gen !== loadGen) return;
      // Jump to newest frame with data
      const latestWithData = frames.reduce((best, f, i) => f.compactBuf ? i : best, -1);
      if (latestWithData > frameIdx) {
        setFrame(latestWithData, true);
      }
    }
  } catch(e) { /* silent */ }
  if (gen === loadGen) liveRefreshTimer = setTimeout(() => liveRefresh(gen), 60000);
}

// ── Frame loading ─────────────────────────────────────────────────────────
async function fetchAndProcess(fi) {
  const f = frames[fi];
  const pParam = curProduct === 'VEL' ? '?p=vel' : curProduct === 'CC' ? '?p=cc' : '';
  const velType = curProduct === 'VEL' ? 'vel' : curProduct === 'CC' ? 'cc' : null;
  // Extract station from file key (e.g. "KLVX_20260316_031856.bz2" → "KLVX")
  const fileSite = f.key.match(/^([A-Z]{4})_/)?.[1] || curSite;
  try {
    const r = await fetch(`/radar/process/${fileSite}/${f.key}${pParam}`);
    if (r.status === 204) return; // no data for this product in this file (mid-scan)
    if (!r.ok) throw new Error(r.status);
    let buf = await r.arrayBuffer();
    const h = new Uint8Array(buf, 0, 2);
    if (h[0] === 0x1f && h[1] === 0x8b) buf = await gunzip(buf);
    f.compactBuf = buf;
    f.msgType    = velType ? `compact_${velType}` : 'compact';
    f.maxRangeKm = new DataView(f.compactBuf).getFloat32(20, true);
  } catch(e) {
    const r2 = await fetch(`/radar/file/${fileSite}/${f.key}`);
    if (!r2.ok) throw new Error(r2.status);
    f.compactBuf = await r2.arrayBuffer();
    f.msgType    = velType ? `level2_${velType}` : 'level2';
    f.maxRangeKm = 460;
  }
}

function keyToLabel(key) {
  const m = key.match(/(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})/);
  if (!m) return key;
  const d = new Date(Date.UTC(+m[1],+m[2]-1,+m[3],+m[4],+m[5]));
  return d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true,timeZoneName:'short'});
}

// ── Radar rendering ────────────────────────────────────────────────────────
async function redrawCurrentFrame() {
  const f = frames[frameIdx];
  if (!f?.compactBuf || !mapReady || !radarLayer) return;

  const msgType  = f.msgType || 'compact';
  const cacheKey = `${curSite}-${msgType}`;

  const needCoords = !coordsCache[cacheKey] && !coordsPending[cacheKey];
  if (needCoords) coordsPending[cacheKey] = true;

  let result;
  try {
    result = await runWorker({
      buffer:     f.compactBuf,
      type:       msgType,
      radarLat:   curLat,
      radarLon:   curLng,
      withCoords: needCoords
    });
  } catch(err) {
    console.error('Worker error:', err);
    return;
  }

  if (result.coords) {
    coordsCache[cacheKey] = { lngs: result.coords.lngs, lats: result.coords.lats };
    delete coordsPending[cacheKey];
  }

  const cached = coordsCache[cacheKey];
  radarLayer.updateFrame(
    result.rgba,
    cached ? cached.lngs : null,
    cached ? cached.lats : null,
    result.nGates,
    result.nRays
  );
}

function clearRadar() {
  if (radarLayer) radarLayer.clear();
}

// ── Slider ────────────────────────────────────────────────────────────────
function initSlider() {
  const row = document.getElementById('segmentRow');
  let isDragging = false;
  row.addEventListener('mousedown',  e => { isDragging = true; scrubFromEvent(e); });
  window.addEventListener('mousemove', e => { if (isDragging) scrubFromEvent(e); });
  window.addEventListener('mouseup',   () => { isDragging = false; });
  row.addEventListener('touchstart', e => { isDragging = true; scrubFromEvent(e.touches[0]); }, {passive:true});
  window.addEventListener('touchmove', e => { if (isDragging) scrubFromEvent(e.touches[0]); }, {passive:true});
  window.addEventListener('touchend',  () => { isDragging = false; });

  document.getElementById('bBack').onclick = () => { stopPlay(); setFrame(frameIdx - 1); };
  document.getElementById('bPlay').onclick = togglePlay;
  document.getElementById('bFwd').onclick  = () => { stopPlay(); setFrame(frameIdx + 1); };

  // Product toggle
  document.querySelectorAll('.ptab').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.p === curProduct) return;
      curProduct = btn.dataset.p;
      document.querySelectorAll('.ptab').forEach(b => b.classList.toggle('active', b.dataset.p === curProduct));
      updateLegend();
      if (curSite) {
        frames.forEach(f => { f.compactBuf = null; f.msgType = 'compact'; });
        for (const k of Object.keys(coordsCache)) delete coordsCache[k];
        if (radarLayer) radarLayer.clear();
        loadStation();
      }
    });
  });

  updateLegend();
}

function scrollToSite() {
  if (curSite && curLat && curLng) map.flyTo({ center: [curLng, curLat], zoom: 7, duration: 600 });
}

function scrubFromEvent(e) {
  if (!frames.length) return;
  const row = document.getElementById('segmentRow');
  const r = row.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  setFrame(Math.round(pct * (frames.length - 1)));
}

function buildTicks(n) {
  const row = document.getElementById('segmentRow');
  row.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const seg = document.createElement('div');
    seg.className = 'seg' + (i === frameIdx ? ' seg-active' : ' seg-future');
    seg.id = 'seg-' + i;
    seg.addEventListener('click', () => setFrame(i));
    row.appendChild(seg);
  }
}

function updateTickEmpty(i) {
  const seg = document.getElementById('seg-' + i);
  if (seg) {
    seg.classList.remove('seg-future', 'seg-past', 'seg-active');
    seg.classList.add('seg-empty');
  }
}

function updateTickLoaded(i) {
  const seg = document.getElementById('seg-' + i);
  if (seg && !seg.classList.contains('seg-active')) {
    seg.classList.remove('seg-future');
    seg.classList.add('seg-past');
  }
}

function setFrame(idx, force) {
  if (!frames.length) return;
  idx = Math.max(0, Math.min(frames.length - 1, idx));
  // Skip empty/failed frames when navigating
  if (!force && frames[idx]?.failed) {
    // find nearest non-failed frame
    for (let d = 1; d < frames.length; d++) {
      if (idx + d < frames.length && !frames[idx + d]?.failed) { idx = idx + d; break; }
      if (idx - d >= 0           && !frames[idx - d]?.failed) { idx = idx - d; break; }
    }
  }
  if (idx === frameIdx && !force) return;
  frameIdx = idx;

  document.querySelectorAll('.seg').forEach((seg, i) => {
    seg.classList.remove('seg-active', 'seg-past', 'seg-future');
    if (i === idx)                    seg.classList.add('seg-active');
    else if (frames[i]?.failed)       seg.classList.add('seg-empty');
    else if (frames[i]?.compactBuf)   seg.classList.add('seg-past');
    else                              seg.classList.add('seg-future');
  });

  const prod = curProduct === 'VEL' ? 'Velocity' : curProduct === 'CC' ? 'Corr. Coeff.' : 'Reflectivity';
  const lbl  = frames[idx]?.label || '';
  document.getElementById('scSub').textContent = lbl ? `${prod} • 0.5° · ${lbl}` : `${prod} • 0.5°`;
  // Show LIVE tag when on the latest frame that actually has data
  const latestLoaded = frames.reduce((best, f, i) => f.compactBuf ? i : best, -1);
  document.getElementById('liveTag').style.display = idx === latestLoaded ? '' : 'none';

  redrawCurrentFrame();

  if (!frames[idx]?.compactBuf) {
    setStatus('Loading…');
    fetchAndProcess(idx).then(() => {
      updateTickLoaded(idx);
      if (idx === frameIdx) { redrawCurrentFrame(); setStatus(''); }
    }).catch(() => setStatus(''));
  }
}

// ── Playback — matches OpenSnow: 50ms/frame, 750ms last-frame hold, loops ─
function togglePlay() { playing ? stopPlay() : startPlay(); }

function startPlay() {
  if (!frames.length) return;
  playing = true;
  document.getElementById('iconPlay').style.display  = 'none';
  document.getElementById('iconPause').style.display = '';
  if (frameIdx >= frames.length - 1) setFrame(0, true);
  scheduleNextFrame();
}

function scheduleNextFrame() {
  if (!playing) return;
  const isLast = frameIdx >= frames.length - 1;
  const delay  = isLast ? 750 : 50; // 750ms hold on last frame, 50ms between frames
  playTimer = setTimeout(() => {
    if (!playing) return;
    if (frameIdx >= frames.length - 1) {
      setFrame(0, true); // loop back to start
    } else {
      setFrame(frameIdx + 1);
    }
    scheduleNextFrame();
  }, delay);
}

function stopPlay() {
  playing = false;
  clearTimeout(playTimer);
  document.getElementById('iconPlay').style.display  = '';
  document.getElementById('iconPause').style.display = 'none';
}

// ── Legend ────────────────────────────────────────────────────────────────
function updateLegend() {
  const bar    = document.getElementById('legend-bar');
  const labels = document.getElementById('legend-labels');
  if (curProduct === 'VEL') {
    bar.style.background = 'linear-gradient(to right,rgb(26,31,73) 0%,rgb(12,94,190) 20%,rgb(107,165,188) 35%,rgb(213,218,221) 45%,rgb(241,236,236) 50%,rgb(228,203,196) 55%,rgb(195,99,70) 70%,rgb(157,25,38) 85%,rgb(68,11,22) 100%)';
    labels.innerHTML = '<span>−60</span><span>−30</span><span>−10</span><span>0</span><span>+10</span><span>+30</span><span>+60 m/s</span>';
  } else if (curProduct === 'CC') {
    bar.style.background = 'linear-gradient(to right,rgb(188,188,188),rgb(11,83,148),rgb(4,114,35),rgb(255,217,102),rgb(237,122,23),rgb(153,0,0),rgb(133,0,195))';
    labels.innerHTML = '<span>0.0</span><span>0.3</span><span>0.5</span><span>0.75</span><span>0.9</span><span>1.0</span>';
  } else {
    bar.style.background = 'linear-gradient(to right,rgb(54,78,130) 0%,rgb(57,85,134) 8%,rgb(76,125,156) 14%,rgb(60,173,110) 22%,rgb(21,125,30) 26%,rgb(203,222,1) 35%,rgb(252,253,0) 38%,rgb(250,148,0) 47%,rgb(249,35,11) 57%,rgb(202,153,180) 67%,rgb(154,36,224) 75%,rgb(132,253,255) 84%,rgb(161,101,73) 92%,rgb(115,10,1) 100%)';
    labels.innerHTML = '<span>−32</span><span>0</span><span>20</span><span>40</span><span>60</span><span>94 dBZ</span>';
  }
}

function setStatus(msg) { document.getElementById('loadStatus').textContent = msg; }
</script>
